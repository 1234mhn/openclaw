<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>☀️ 韩语主题学习 · 한국어 테마 학습</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Malgun Gothic', sans-serif;
  background: #f0f4f8;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: manipulation;
}
body { position: relative; }

.page-container {
  position: relative;
  width: 100%; height: 100%;
  overflow: hidden;
}
.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
  z-index: 1;
}
.page.active { display: flex; flex-direction: column; z-index: 2; }

#page-main {
  background: linear-gradient(180deg, #4A90D9 0%, #74B9FF 40%, #A8D8EA 70%, #D4E9F7 100%);
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
}
#page-main.active { display: flex; }

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  animation: floatCloud linear infinite;
  pointer-events: none;
  z-index: 0;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}
.cloud-1 { width: 120px; height: 40px; top: 8%; left: -130px; animation-duration: 25s; }
.cloud-1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
.cloud-1::after { width: 70px; height: 55px; top: -20px; left: 45px; }
.cloud-2 { width: 160px; height: 50px; top: 18%; left: -170px; animation-duration: 35s; animation-delay: 5s; }
.cloud-2::before { width: 60px; height: 60px; top: -30px; left: 25px; }
.cloud-2::after { width: 85px; height: 65px; top: -25px; left: 55px; }
.cloud-3 { width: 90px; height: 32px; top: 32%; left: -100px; animation-duration: 20s; animation-delay: 10s; }
.cloud-3::before { width: 40px; height: 40px; top: -20px; left: 15px; }
.cloud-3::after { width: 55px; height: 45px; top: -15px; left: 35px; }
.cloud-4 { width: 140px; height: 44px; top: 50%; left: -150px; animation-duration: 30s; animation-delay: 3s; }
.cloud-4::before { width: 55px; height: 55px; top: -28px; left: 22px; }
.cloud-4::after { width: 75px; height: 60px; top: -22px; left: 50px; }

@keyframes floatCloud {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

.main-scrollable {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.main-scrollable::-webkit-scrollbar { width: 4px; }
.main-scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

.main-content {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  padding: 24px 16px 30px;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100%; justify-content: center;
}

.main-header { text-align: center; margin-bottom: 28px; }
.main-header h1 {
  font-size: 28px; font-weight: 700; color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  margin-bottom: 6px;
}
.main-header .kr-title {
  font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.9);
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  text-shadow: 0 1px 8px rgba(0,0,0,0.1);
}
.main-header .subtitle { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 8px; }

.theme-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; width: 100%; max-width: 400px;
}

.theme-card {
  aspect-ratio: 1 / 1;
  border-radius: 18px; padding: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  position: relative; overflow: hidden;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  border: 2px solid rgba(255,255,255,0.3);
}
.theme-card .card-emoji { font-size: 44px; margin-bottom: 10px; line-height: 1; }
.theme-card .card-label { font-size: 16px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.theme-card .card-label-kr { font-size: 12px; color: rgba(255,255,255,0.7); font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; margin-top: 2px; }

.theme-card.weather-card {
  background: linear-gradient(135deg, rgba(52,152,219,0.85), rgba(41,128,185,0.9));
  border-color: rgba(255,255,255,0.5);
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(41,128,185,0.4);
}
.theme-card.weather-card:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(41,128,185,0.5); }
.theme-card.weather-card:active { transform: scale(0.96); }

.theme-card.disabled-card {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.15);
  cursor: default;
}
.theme-card.disabled-card .card-emoji { opacity: 0.5; }
.theme-card.disabled-card .card-label { opacity: 0.5; }
.theme-card.disabled-card .card-label-kr { opacity: 0.4; }

.coming-soon {
  position: absolute; top: 8px; right: 8px;
  background: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.main-header { animation: fadeInUp 0.8s ease-out; }
.theme-card { animation: fadeInUp 0.6s ease-out both; }
.theme-card:nth-child(1) { animation-delay: 0.1s; }
.theme-card:nth-child(2) { animation-delay: 0.2s; }
.theme-card:nth-child(3) { animation-delay: 0.3s; }
.theme-card:nth-child(4) { animation-delay: 0.4s; }
.theme-card:nth-child(5) { animation-delay: 0.5s; }
.theme-card:nth-child(6) { animation-delay: 0.6s; }

#page-modules {
  background: linear-gradient(180deg, #4A90D9 0%, #74B9FF 40%, #A8D8EA 70%, #D4E9F7 100%);
}
#page-modules.active { display: flex; }

.modules-scrollable {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modules-scrollable::-webkit-scrollbar { width: 4px; }
.modules-scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

.modules-top {

  display: flex; align-items: center;
  padding: 12px 16px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);

}
.modules-top .back-btn {

}
.modules-top .back-btn span { font-size: 13px; }
.modules-top .title-area { flex: 1; text-align: center; }
.modules-top .title-area h2 { font-size: 18px; font-weight: 600; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.1); }

.modules-list {
  padding: 0 16px 40px;
  display: flex; flex-direction: column;
  gap: 12px;
}

.module-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 16px 18px;
  display: flex; align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.3);
}
.module-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.module-card:active { transform: scale(0.98); }

.module-card .m-icon {
  font-size: 36px; flex-shrink: 0;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
}
.module-card .m-info { flex: 1; min-width: 0; }
.module-card .m-title {
  font-size: 16px; font-weight: 600; color: #2c3e50;
  display: flex; align-items: center; gap: 6px;
}
.module-card .m-title .m-badge {
  font-size: 11px; color: #fff;
  padding: 1px 8px; border-radius: 8px;
  font-weight: 500;
}
.module-card .m-desc {
  font-size: 13px; color: #888;
  margin-top: 2px;
}
.module-card .m-arrow {
  font-size: 20px; color: #bbb;
  flex-shrink: 0;
}

#page-card {
  background: linear-gradient(180deg, #E8F0FE 0%, #D4E9F7 40%, #C8E6F5 70%, #BBDEFB 100%);
}
#page-card.active { display: flex; }

.card-top {
  display: flex; align-items: center;
  padding: 10px 16px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  min-height: 48px;
}
.card-top .back-btn {
  background: none; border: none;
  font-size: 18px; cursor: pointer;
  padding: 4px 6px; color: #555;

}
.card-top .back-btn span { font-size: 12px; }
.card-top .card-title-area { flex: 1; text-align: center; }
.card-top .card-title-area h3 { font-size: 15px; font-weight: 500; color: #444; }

.card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 16px 8px;
  overflow: hidden;
  position: relative;
}

.card-wrapper {
  position: relative;
  width: 94%;
  max-width: 420px;
  height: 82vh;
  min-height: 420px;
  max-height: 600px;
}

@media (max-width: 400px) {
  .card-wrapper { width: 95%; height: 78vh; min-height: 400px; }
}
@media (min-width: 768px) {
  .card-wrapper { width: 420px; height: 500px; }
}

.big-flip-card {
  width: 100%; height: 100%;
  perspective: 1200px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: absolute;
  top: 0; left: 0;
}
.big-flip-card-inner {
  position: relative;
  width: 100%; height: 100%;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  border-radius: 16px;
}
.big-flip-card.flipped .big-flip-card-inner { transform: rotateY(180deg); }

.big-card-front, .big-card-back {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  overflow-y: auto;
}
.big-card-front {
  justify-content: center;
}
.big-card-back {
  justify-content: flex-start;
  padding: 20px 16px 12px;
  gap: 6px;
}
.big-card-front {
  background: linear-gradient(160deg, #FFF8E1, #FFFDE7);
  border: 1px solid rgba(0,0,0,0.06);
}
.big-card-back {
  background: linear-gradient(160deg, #2C3E50, #1A252F);
  color: #fff;
  transform: rotateY(180deg);
}

.vocab-card-front .kr-large {
  font-size: 38px;
  font-weight: 900;
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  color: #2c3e50;
  line-height: 1.2;
  margin-bottom: 8px;
  word-break: keep-all;
}
@media (max-width: 400px) {
  .vocab-card-front .kr-large { font-size: 32px; }
}
.vocab-card-front .pron-badge {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 14px;
  color: #999;
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: rgba(0,0,0,0.04);

}
.vocab-card-front .emoji-large {

}
.audio-btn {

}
.audio-btn:hover { transform: translateX(-50%) scale(1.1); }
.audio-btn:active { transform: translateX(-50%) scale(0.9); }
.audio-btn-sm {

.audio-btn-sm:hover { transform: scale(1.15); }
.audio-btn-sm:active { transform: scale(0.9); }
.vocab-card-front .tap-hint {

.vocab-card-front .icon-deco {

.vocab-card-back .cn-big {

}
.vocab-card-back .phrase-text {

.vocab-card-back .example-text {

}

.ex-card-front .ex-icon-big {

}
.ex-card-front .ex-label {

.ex-card-front .ex-question {

.ex-card-back .ex-answer-icon { font-size: 32px; margin-bottom: 8px; }

.complete-card .big-card-front {

}
.complete-card .complete-icon { font-size: 48px; margin-bottom: 12px; }
.complete-card .complete-title {

}

}
.complete-card .complete-emoji-row {

}

.card-wrapper .big-flip-card {
  transition: opacity 0.25s ease;
}
.card-wrapper .big-flip-card.slide-left-out {
  animation: slideCardLeftOut 0.3s ease forwards;
}
.card-wrapper .big-flip-card.slide-right-out {
  animation: slideCardRightOut 0.3s ease forwards;
}
.card-wrapper .big-flip-card.slide-left-in {
  animation: slideCardLeftIn 0.3s ease forwards;
}
.card-wrapper .big-flip-card.slide-right-in {

}

@keyframes slideCardLeftOut {
  0% { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(-120%); opacity: 0; }
}
@keyframes slideCardRightOut {
  0% { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(120%); opacity: 0; }
}
@keyframes slideCardLeftIn {
  0% { transform: translateX(120%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}
@keyframes slideCardRightIn {
  0% { transform: translateX(-120%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}

// ===== STATE =====
let currentPage = 'main';
let currentModuleIdx = 0; // 0-based index in MODULE_DATA
let currentCardIdx = 0;
let isAnimating = false;
let touchStartX = 0;

// ===== INIT =====
function init() {
  renderModuleList();
  showPage('page-main');
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// ===== PAGE NAVIGATION =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = '';
  });
  const page = document.getElementById(id);
  if (page) page.classList.add('active');
}

function pageTransition(fromId, toId, direction) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  if (!from || !to) return;

  const outClass = direction === 'right' ? 'slide-out-left' : 'slide-out-right';
  const inClass = direction === 'right' ? 'slide-in-right' : 'slide-in-left';

  document.querySelectorAll('.page').forEach(p => p.style.display = '');

  to.classList.add('active', inClass);
  from.classList.add(outClass);

  setTimeout(() => {
    from.classList.remove('active', outClass);
    to.classList.remove(inClass);
  }, 380);
}

function showModulesPage() {
  pageTransition('page-main', 'page-modules', 'right');
  currentPage = 'modules';
}

function goBackToMain() {
  pageTransition('page-modules', 'page-main', 'left');
  currentPage = 'main';
}

function goBackToModules() {
  showPage('page-modules');
  currentPage = 'modules';
}

// ===== MODULE LIST =====
function renderModuleList() {
  const list = document.getElementById('modules-list');
  list.innerHTML = '';
  const icons = ['☀️', '🌡️', '🌧️', '🌬️', '💬', '🌪️', '🔊'];
  for (let i = 0; i < MODULE_DATA.length; i++) {
    const m = MODULE_DATA[i];
    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="m-icon" style="background:${m.color}22; color:${m.color}">${icons[i]}</div>
      <div class="m-info">
        <div class="m-title">
          ${m.title}
          <span class="m-badge" style="background:${m.color}">${i+1}/7</span>
        </div>
        <div class="m-desc">${m.desc}</div>
      </div>
      <div class="m-arrow">›</div>
    `;
    card.addEventListener('click', () => openCardLearning(i));
    list.appendChild(card);
  }
}

// ===== CARD LEARNING =====
function openCardLearning(moduleIdx) {
  currentModuleIdx = moduleIdx;
  currentCardIdx = 0;
  const m = MODULE_DATA[moduleIdx];
  document.getElementById('card-page-title').textContent = m.title;
  document.getElementById('card-page-title').style.color = m.color;

  const wrapper = document.getElementById('card-wrapper');
  wrapper.className = 'card-wrapper';
  wrapper.classList.add(m.colorClass);

  showPage('page-card');
  currentPage = 'card';
  renderCurrentCard();
}

function renderCurrentCard() {
  const wrapper = document.getElementById('card-wrapper');
  const m = MODULE_DATA[currentModuleIdx];
  const cards = m.cards;
  const total = cards.length;

  if (currentCardIdx >= total) {
    showCompletionPage(m);
    return;
  }

  const card = cards[currentCardIdx];

  document.getElementById('card-progress').textContent = `${currentCardIdx + 1}/${total}`;

  if (card.type === 'vocab') {
    document.getElementById('card-type-tag').textContent = '📖 词汇';
    document.getElementById('card-type-tag').style.color = m.color;
    wrapper.innerHTML = buildVocabCard(card);
  } else if (card.type === 'ex') {
    document.getElementById('card-type-tag').textContent = '📝 练习';
    document.getElementById('card-type-tag').style.color = '#E74C3C';
    wrapper.innerHTML = buildExCard(card);
  } else if (card.type === 'rule') {
    document.getElementById('card-type-tag').textContent = '📚 音变规则';
    document.getElementById('card-type-tag').style.color = '#E65100';
    wrapper.innerHTML = buildRuleCard(card);
  }

  // Add flip handler - skip if clicking audio button
  const flipCard = wrapper.querySelector('.big-flip-card');
  if (flipCard && card.type !== 'rule') {
    flipCard.addEventListener('click', (e) => {
      if (e.target.closest('.audio-btn') || e.target.closest('.audio-btn-sm')) return;
      flipCard.classList.toggle('flipped');
    });
  }

  // Wire up audio buttons
  wrapper.querySelectorAll('.audio-btn, .audio-btn-sm').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = btn.dataset.text || '';
      if (text) {
        speakKorean(text);
      }
    });
  });

  // Update nav buttons
  const prevBtn = document.getElementById('prev-card-btn');
  const nextBtn = document.getElementById('next-card-btn');
  prevBtn.disabled = currentCardIdx === 0;
  nextBtn.disabled = false;

  document.getElementById('complete-actions').style.display = 'none';
  document.getElementById('card-nav').style.display = 'flex';

  setupTouchSwipe(wrapper);

  setTimeout(() => {
    if (flipCard) flipCard.classList.remove('flipped');
  }, 50);
}

function buildVocabCard(card) {
  const krText = card.kr;
  const exampleText = card.example || '';
  const phraseText = card.phrase || '';
  let grammarHtml = '';
  let moreHtml = '';
  if (card.grammar) {
    grammarHtml = `<div class="grammar-box"><div class="grammar-title">📖 语法讲解</div><div class="grammar-text">${card.grammar}</div></div>`;
  }
  if (card.more && card.more.length) {
    const items = card.more.map(s => {
      const parts = s.split('|');
      return `<div class="more-item"><div class="more-kr">${parts[0] || ''}</div><div class="more-cn">${parts[1] || ''}</div></div>`;
    }).join('');
    moreHtml = `<div class="more-box"><div class="grammar-title">✏️ 更多例句</div>${items}</div>`;
  }
  return `
    <div class="big-flip-card vocab-card">
      <div class="big-flip-card-inner">
        <div class="big-card-front vocab-card-front">
          <button class="audio-btn" data-text="${krText}">🔊</button>
          <div class="pron-badge">${card.pron}</div>
          <div class="icon-deco">${card.emoji}</div>
          <div class="kr-large">${card.kr}</div>
          <div class="tap-hint">👆 点击翻转</div>
          <div class="emoji-large">${card.emoji}</div>
        </div>
        <div class="big-card-back vocab-card-back">
          <div class="cn-big">${card.cn}</div>
          <div class="phrase-text">${card.phrase} <button class="audio-btn-sm" data-text="${phraseText}">🔊</button></div>
          <div class="example-text">${card.example} <button class="audio-btn-sm" data-text="${exampleText}">🔊</button></div>
          <div class="example-cn">${card.exampleCn || ''}</div>
          ${card.sound ? `<div class="sound-tag">🔊 ${card.sound}</div>` : ''}
          ${grammarHtml}
          ${moreHtml}
        </div>
      </div>
    </div>
  `;
}

function buildExCard(card) {
  return `
    <div class="big-flip-card ex-card">
      <div class="big-flip-card-inner">
        <div class="big-card-front ex-card-front">
          <div class="ex-icon-big">📝</div>
          <div class="ex-label">尝试回答吧 ✨</div>
          <div class="ex-question">${card.question}</div>
          <div class="tap-hint" style="position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:11px; color:#bbb; white-space:nowrap;">👆 点击看答案</div>
        </div>
        <div class="big-card-back ex-card-back">
          <div class="ex-answer-icon">✅</div>
          <div class="ex-answer-label">参考答案</div>

          ${card.detail ? `<div class="ex-answer-detail">${card.detail}</div>` : ''}
        </div>
      </div>

}

          <div class="complete-emoji-row">${module.completeEmoji}</div>
        </div>
        <div class="big-card-back"></div>
      </div>
    </div>
  `;
}

// ===== CARD NAVIGATION =====
function nextCard() {
  if (isAnimating) return;
  const m = MODULE_DATA[currentModuleIdx];
  const total = m.cards.length;
  if (currentCardIdx >= total) return;

  const wrapper = document.getElementById('card-wrapper');
  const current = wrapper.querySelector('.big-flip-card');
  if (current) {
    current.classList.add('slide-left-out');
    isAnimating = true;
    setTimeout(() => {
      currentCardIdx++;
      renderCurrentCard();
      const newCard = wrapper.querySelector('.big-flip-card');
      if (newCard) newCard.classList.add('slide-right-in');
      setTimeout(() => {
        if (newCard) newCard.classList.remove('slide-right-in');
        isAnimating = false;
      }, 300);
    }, 280);
  }
}

function prevCard() {
  if (isAnimating) return;
  if (currentCardIdx <= 0) return;

  const wrapper = document.getElementById('card-wrapper');
  const current = wrapper.querySelector('.big-flip-card');
  if (current) {
    current.classList.add('slide-right-out');
    isAnimating = true;
    setTimeout(() => {
      currentCardIdx--;
      renderCurrentCard();
      const newCard = wrapper.querySelector('.big-flip-card');
      if (newCard) newCard.classList.add('slide-left-in');
      setTimeout(() => {
        if (newCard) newCard.classList.remove('slide-left-in');
        isAnimating = false;
      }, 300);
    }, 280);
  }
}

// ===== TOUCH SWIPE =====
function setupTouchSwipe(wrapper) {
  wrapper.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  wrapper.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      e.preventDefault();
      if (diff > 0) {
        nextCard();
      } else {
        prevCard();
      }
    }
  }, { passive: false });
}

// ===== COMPLETION PAGE =====
function showCompletionPage(module) {
  const wrapper = document.getElementById('card-wrapper');
  wrapper.innerHTML = buildCompleteCard(module);
  document.getElementById('card-progress').textContent = '🎉 完成！';
  document.getElementById('card-type-tag').textContent = '🎊 恭喜！';
  document.getElementById('card-nav').style.display = 'flex';

  const prevBtn = document.getElementById('prev-card-btn');
  const nextBtn = document.getElementById('next-card-btn');
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';

  document.getElementById('complete-actions').style.display = 'flex';
  const actions = document.getElementById('complete-actions');
  actions.innerHTML = '';

  const backBtn = document.createElement('button');
  backBtn.className = 'module-complete-btn secondary';
  backBtn.textContent = '返回模块列表';
  backBtn.onclick = goBackToModules;
  actions.appendChild(backBtn);

  if (currentModuleIdx < MODULE_DATA.length - 1) {
    const nextBtn2 = document.createElement('button');
    nextBtn2.className = 'module-complete-btn';
    nextBtn2.style.background = MODULE_DATA[currentModuleIdx + 1].color;
    nextBtn2.textContent = '进入下一模块 →';
    nextBtn2.onclick = () => openCardLearning(currentModuleIdx + 1);
    actions.appendChild(nextBtn2);
  } else {
    const allDoneBtn = document.createElement('button');
    allDoneBtn.className = 'module-complete-btn';
    allDoneBtn.textContent = '🎉 全部完成！回到主界面';
    allDoneBtn.onclick = () => {
      showPage('page-main');
      currentPage = 'main';
    };
    actions.appendChild(allDoneBtn);
  }
}

// 🔊 韩语语音播放 — 使用预生成MP3
let audioLookup = {};
let audioLoaded = false;
let currentAudio = null;

// 加载音频查找表
fetch('audio/lookup.json')
  .then(r => r.json())
  .then(data => { audioLookup = data; audioLoaded = true; })
  .catch(() => console.warn('音频查找表加载失败，降级到TTS'));

function speakKorean(text) {
  if (!text || text.trim() === '') return;
  const btn = document.activeElement;
  if (btn) {
    btn.style.transform = 'scale(0.85)';
    setTimeout(() => { btn.style.transform = ''; }, 200);
  }
  
  // 停止之前的播放
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  
  // 尝试播放预生成MP3
  const mp3Path = audioLookup[text];
  if (mp3Path) {
    currentAudio = new Audio(mp3Path);
    currentAudio.play().catch(() => {
      // 降级到浏览器TTS
      playTTS(text);
    });
  } else {
    playTTS(text);
  }
}

function playTTS(text) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  } catch(e) {
    console.warn('TTS failed:', e);
  }
}
