<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 双语博主数据录入</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;padding:20px}
.container{max-width:500px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px;color:#333}
.sub{font-size:13px;color:#999;margin-bottom:20px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.card h2{font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.row{display:flex;align-items:center;margin-bottom:10px}
.row label{width:80px;font-size:14px;color:#555;flex-shrink:0}
.row input{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.row input:focus{border-color:#1a73e8}
.row .unit{font-size:12px;color:#999;margin-left:6px;width:40px}
.btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{background:#1557b0}
.status{text-align:center;font-size:14px;color:#2ecc71;margin-top:12px;opacity:0;transition:.3s}
.status.show{opacity:1}
.tip{font-size:12px;color:#bbb;text-align:center;margin-top:12px}
.history{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.history h2{font-size:16px;margin-bottom:10px}
.history table{width:100%;font-size:12px;border-collapse:collapse}
.history th{text-align:left;padding:6px 4px;border-bottom:2px solid #eee;color:#888}
.history td{padding:6px 4px;border-bottom:1px solid #f5f5f5;color:#555}
</style>
</head>
<body>
<div class="container">
  <h1>📊 双语博主数据录入</h1>
  <p class="sub">每天发完内容，花10秒填一下</p>

  <div class="card">
    <h2>📕 小红书</h2>
    <div class="row">
      <label>笔记标题</label>
      <input id="xhs_title" placeholder="例：韩语感叹句3种说法">
    </div>
    <div class="row">
      <label>发布时间</label>
      <input id="xhs_time" placeholder="例：20:00" value="20:00">
    </div>
    <div class="row">
      <label>浏览量</label>
      <input id="xhs_views" type="number" placeholder="0">
      <span class="unit">次</span>
    </div>
    <div class="row">
      <label>点赞</label>
      <input id="xhs_likes" type="number" placeholder="0">
      <span class="unit">👍</span>
    </div>
    <div class="row">
      <label>收藏</label>
      <input id="xhs_saves" type="number" placeholder="0">
      <span class="unit">📌</span>
    </div>
    <div class="row">
      <label>评论</label>
      <input id="xhs_comments" type="number" placeholder="0">
      <span class="unit">💬</span>
    </div>
    <div class="row">
      <label>涨粉</label>
      <input id="xhs_followers" type="number" placeholder="0">
      <span class="unit">➕</span>
    </div>
  </div>

  <div class="card">
    <h2>🎵 抖音</h2>
    <div class="row">
      <label>视频标题</label>
      <input id="dy_title" placeholder="例：韩语风景句">
    </div>
    <div class="row">
      <label>播放量</label>
      <input id="dy_plays" type="number" placeholder="0">
      <span class="unit">次</span>
    </div>
    <div class="row">
      <label>点赞</label>
      <input id="dy_likes" type="number" placeholder="0">
      <span class="unit">👍</span>
    </div>
    <div class="row">
      <label>涨粉</label>
      <input id="dy_followers" type="number" placeholder="0">
      <span class="unit">➕</span>
    </div>
  </div>

  <button class="btn" onclick="submitData()">✅ 提交数据</button>
  <div class="status" id="status">✅ 已保存！</div>
  <p class="tip">数据存在浏览器本地，不会丢失</p>

  <div class="history" id="historySection">
    <h2>📋 提交记录</h2>
    <table>
      <thead><tr><th>日期</th><th>内容</th><th>浏览</th><th>点赞</th><th>收藏</th></tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

  <div style="margin-top:16px;text-align:center">
    <button onclick="exportData()" style="background:none;border:1px solid #ddd;padding:10px 20px;border-radius:8px;font-size:13px;color:#888;cursor:pointer">📤 导出数据</button>
    <button onclick="clearData()" style="background:none;border:1px solid #f5f5f5;padding:10px 20px;border-radius:8px;font-size:13px;color:#ccc;cursor:pointer;margin-left:8px">🗑️ 清空</button>
  </div>
</div>

<script>
function getData(){
  try{return JSON.parse(localStorage.getItem('tracker_data'))||[]}catch(e){return[]}
}
function setData(d){localStorage.setItem('tracker_data',JSON.stringify(d))}

function submitData(){
  var data=getData();
  var today=new Date().toISOString().slice(0,10);
  var xhsTitle=document.getElementById('xhs_title').value;
  var dyTitle=document.getElementById('dy_title').value;
  
  // Submit to server
  if(xhsTitle){
    fetch('/korean/api/tracker',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        date:today,platform:'小红书',title:xhsTitle,
        time:document.getElementById('xhs_time').value,
        views:parseInt(document.getElementById('xhs_views').value)||0,
        likes:parseInt(document.getElementById('xhs_likes').value)||0,
        saves:parseInt(document.getElementById('xhs_saves').value)||0,
        comments:parseInt(document.getElementById('xhs_comments').value)||0,
        followers:parseInt(document.getElementById('xhs_followers').value)||0,
        content_type:'韩语'
      })
    }).catch(function(e){console.log('server save error',e)});
  }
  if(dyTitle){
    fetch('/korean/api/tracker',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        date:today,platform:'抖音',title:dyTitle,
        views:parseInt(document.getElementById('dy_plays').value)||0,
        likes:parseInt(document.getElementById('dy_likes').value)||0,
        followers:parseInt(document.getElementById('dy_followers').value)||0,
        content_type:'韩语'
      })
    }).catch(function(e){console.log('server save error',e)});
  }
  
  var entry={
    date:today,
    time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
    xhs:{title:xhsTitle,time:document.getElementById('xhs_time').value,views:parseInt(document.getElementById('xhs_views').value)||0,likes:parseInt(document.getElementById('xhs_likes').value)||0,saves:parseInt(document.getElementById('xhs_saves').value)||0,comments:parseInt(document.getElementById('xhs_comments').value)||0,followers:parseInt(document.getElementById('xhs_followers').value)||0},
    dy:{title:dyTitle,plays:parseInt(document.getElementById('dy_plays').value)||0,likes:parseInt(document.getElementById('dy_likes').value)||0,followers:parseInt(document.getElementById('dy_followers').value)||0}
  };
  data.push(entry);
  setData(data);
  
  // Clear inputs
  ['xhs_views','xhs_likes','xhs_saves','xhs_comments','xhs_followers','dy_plays','dy_likes','dy_followers'].forEach(function(id){document.getElementById(id).value=''});
  
  var s=document.getElementById('status');
  s.classList.add('show');
  setTimeout(function(){s.classList.remove('show')},2000);
  renderHistory();
}

function renderHistory(){
  var data=getData(),tbody=document.getElementById('historyBody');
  tbody.innerHTML='';
  data.slice(-10).reverse().forEach(function(d){
    var title=d.xhs.title||d.dy.title||'-';
    var views=Math.max(d.xhs.views,d.dy.plays);
    var likes=Math.max(d.xhs.likes,d.dy.likes);
    var saves=d.xhs.saves||'-';
    tbody.innerHTML+='<tr><td>'+d.date.slice(5)+'</td><td>'+title.slice(0,10)+'</td><td>'+views+'</td><td>'+likes+'</td><td>'+saves+'</td></tr>';
  });
}

function exportData(){
  var data=getData();
  var csv='日期,平台,标题,浏览量,点赞,收藏,评论,涨粉\n';
  data.forEach(function(d){
    if(d.xhs.title)csv+=d.date+',小红书,'+d.xhs.title+','+d.xhs.views+','+d.xhs.likes+','+d.xhs.saves+','+d.xhs.comments+','+d.xhs.followers+'\n';
    if(d.dy.title)csv+=d.date+',抖音,'+d.dy.title+','+d.dy.plays+','+d.dy.likes+',,,,'+d.dy.followers+'\n';
  });
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='社媒数据_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function clearData(){
  if(confirm('确认清空所有数据？')){localStorage.removeItem('tracker_data');renderHistory()}
}

renderHistory();
</script>
</body>
</html>
