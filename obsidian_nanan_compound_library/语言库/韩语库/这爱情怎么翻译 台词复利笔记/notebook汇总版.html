var LESSON_DATA = {};
LESSON_DATA[24] = {
  title: "第24课 · 你是知道我弱点的",
  lines: [{"kr": "그쪽이 내 약점을 알고 있다고 생각하니까", "cn": "一想到你知道我的弱点", "en": "→ Because I know you know my weakness", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그쪽</b> — 那边/您(you/that person) ｜ <b>내</b> — 我的(나의缩略)(my) ｜ <b>약점</b> — 弱点(weakness) ｜ <b>알다</b> — 知道(to know) ｜ <b>있다</b> — 有/在(to exist) ｜ <b>생각하다</b> — 想/认为(to think)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>약점을 알다</b> — 知道弱点 (to know one's weakness)<br><span style=\"font-size:12px;color:#555\">→ 그는 내 약점을 알아요 — 他知道我的弱点 — He knows my weakness.</span><br><br>② <b>그쪽이 생각하기에</b> — 在您看来 (in your opinion)<br><span style=\"font-size:12px;color:#555\">→ 그쪽이 생각하기에 이게 괜찮아요? — 您觉得这样行吗？ — Do you think this is okay?</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>내 약점을 알게 됐어요</b><br><span style=\"font-size:12px;color:#888\">→ 我知道了你的弱点 — I came to know your weakness.</span><br><br>② <b>그렇게 생각하는 이유가 뭐예요?</b><br><span style=\"font-size:12px;color:#888\">→ 你这么想的理由是什么？ — What makes you think that?</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-(ㄴ/은)다고 생각하다</b>「认为…」—— 动词词干后接<b>-ㄴ다고/은다고</b>，形容词后接<b>-다고</b>，用于引用或陈述自己的看法。相当于英语\"I think that...\"。<br><b>-(으)니까</b>「因为/既然…」—— 表原因或理由，后常接请求或主张。比-아/어서更强调主观理由。<br>两个语法叠加：先用-다고引出想法，再用-니까说明原因。整句意为\"因为觉得你知道我的弱点\"。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>그분이 의사라고 생각했어요</b><br><span style=\"font-size:12px;color:#888\">→ 我以为那位是医生 — I thought that person was a doctor.</span><br><br>② <b>시간이 없으니까 빨리 가요</b><br><span style=\"font-size:12px;color:#888\">→ 因为没时间了，快走吧 — Since we don't have time, let's go quickly.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>알고</b> → [알고] 无特殊<br><b>있다고</b> → [읻따고] ㅆ→ㄷ + 紧音化<br><b>생각하니까</b> → [생가카니까] ㅎ送气化（ㅎ+아→카）</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "나도 당신 약점을 들쑤시고 싶었나 봐요", "cn": "我也忍不住想戳戳你的弱点", "en": "→ I think I wanted to poke at your weakness too", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>나도</b> — 我也(I also) ｜ <b>당신</b> — 您/你(you) ｜ <b>약점</b> — 弱点(weakness) ｜ <b>들쑤시다</b> — 捅/翻/戳(to poke/prod/stir up) ｜ <b>싶다</b> — 想(to want) ｜ <b>보다</b> — 看/推测(to see/guess)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>약점을 들쑤시다</b> — 戳弱点 (to poke at someone's weakness)<br><span style=\"font-size:12px;color:#555\">→ 그 사람은 항상 내 약점을 들쑤셔요 — 那人老是戳我的痛处 — He always pokes at my weak spot.</span><br><br>② <b>싶었나 보다</b> — 看来是想… (must have wanted to...)<br><span style=\"font-size:12px;color:#555\">→ 그도 가고 싶었나 봐요 — 看来他也想去 — He must have wanted to go too.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>그 말이 내 약점을 찔렀어요</b><br><span style=\"font-size:12px;color:#888\">→ 那句话戳中了我的弱点 — That remark hit my sore spot.</span><br><br>② <b>날씨가 추워지나 봐요</b><br><span style=\"font-size:12px;color:#888\">→ 看来天要变冷了 — It looks like the weather is getting colder.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-고 싶다</b>「想做…」—— 动词词干后接-고 싶다表愿望。主语为第三人称时用-고 싶어하다。<br><b>-(으)ㄴ가 보다 / -나 보다</b>「看来是…」—— 基于观察的推测：形容词用-ㄴ가 보다，动词用-나 보다。过去时用-었나 보다。<br><b>들쑤시다</b>本义\"翻找/捅\"，引申为\"戳痛处\"，是韩语中生动的口语表达。类似英语\"poke at someone's sore spot\"。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>여행 가고 싶어요</b><br><span style=\"font-size:12px;color:#888\">→ 我想去旅行 — I want to go traveling.</span><br><br>② <b>그 영화 재미있나 봐요</b><br><span style=\"font-size:12px;color:#888\">→ 那部电影看来挺有意思的 — That movie looks interesting.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>들쑤시고</b> → [들쑤시고] 固有紧音<br><b>싶었나</b> → [시펀나] ㅂ→ㅁ鼻音化（ㅂ在ㄴ前变为ㅁ）<br><b>봐요</b> → [봐요] 元音缩合(보+아요→봐요)</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "그래서 지금은 좀 어때요? 당신 약점", "cn": "那你现在呢？你的弱点", "en": "→ So how about now? Your weakness", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그래서</b> — 所以/那么(so/therefore) ｜ <b>지금</b> — 现在(now) ｜ <b>좀</b> — 有点/稍微(a little/a bit) ｜ <b>어떻다</b> — 怎么样(how is/how about) ｜ <b>당신</b> — 您/你(you) ｜ <b>약점</b> — 弱点(weakness)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>지금은 어때?</b> — 现在怎么样？ (How is it now?)<br><span style=\"font-size:12px;color:#555\">→ 지금은 기분이 어때요? — 现在心情怎么样？ — How are you feeling now?</span><br><br>② <b>좀 어떻다</b> — 有点怎么样 (to be somewhat...)<br><span style=\"font-size:12px;color:#555\">→ 맛이 좀 어때요? — 味道怎么样？ — How does it taste?</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>그래서 결정은 어떻게 됐어요?</b><br><span style=\"font-size:12px;color:#888\">→ 那决定怎么样了？ — So what was the decision?</span><br><br>② <b>요즘 일은 좀 어때요?</b><br><span style=\"font-size:12px;color:#888\">→ 最近工作怎么样？ — How's work these days?</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-은/는</b> 话题助词 —— 「지금은」中-은表对比/强调，暗示\"现在\"与\"之前\"的不同。<br><b>어때요</b> = 어떠해요? 的缩略形，意为\"怎么样？\"，是最常用的日常问句之一。类似英语\"How is it going?\" / \"How about it?\"。<br>注意：此句为两个短句连用：先用\"그래서 지금은 좀 어때요?\"抛出问题，再补上\"당신 약점\"明确提问对象，口语中常见。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>날씨는 좀 어때요?</b><br><span style=\"font-size:12px;color:#888\">→ 天气怎么样？ — How's the weather?</span><br><br>② <b>그래서 결론이 뭐예요?</b><br><span style=\"font-size:12px;color:#888\">→ 所以结论是什么？ — So what's the conclusion?</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>어때요</b> → [어때요] 元音缩合(어떠+해요→어때요)<br><b>약점</b> → [약쯤] 紧音化(ㄱ+ㅈ→ㄲ)</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "도라미요?", "cn": "都拉美吗？", "en": "→ Do Ra-mi?", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>도라미</b> — 都拉美(剧中人物)(Do Ra-mi(character name)) ｜ <b>-요</b> — 疑问终结语尾(polite question ending)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>[人名]+요?</b> — …吗？(确认疑问) — (Name)+yo? (confirming)<br><span style=\"font-size:12px;color:#555\">→ 철수요? — 是哲秀吗？ — Chul-soo?</span><br><br>② <b>도라미가 누구예요?</b> — 都拉美是谁？ — Who is Do Ra-mi?<br><span style=\"font-size:12px;color:#555\">→ 도라미는 여자 주인공이에요 — 都拉美是女主人公 — Do Ra-mi is the female lead.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>지금 갈 거예요?</b><br><span style=\"font-size:12px;color:#888\">→ 现在要去吗？ — Are you going now?</span><br><br>② <b>그분이 선생님이요?</b><br><span style=\"font-size:12px;color:#888\">→ 那位是老师吗？ — That person is a teacher?</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>人名(称呼) + 요?</b>「是…吗？」—— 以升调念出人名加上-요，构成简短的确认疑问句。<br>常用场景：① 听到对方提到某个名字后反问确认② 猜测对方的意图或想法。<br>在此对话中，A问\"你的弱点怎么样了\"，B反问\"都拉美吗？\"—— B推测A的弱点与都拉美有关。语气是\"你是说…吗？/该不会是…吧？\"，带有试探和推测的意味。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>민수요?</b><br><span style=\"font-size:12px;color:#888\">→ 民秀吗？ — Min-su? (confirming)</span><br><br>② <b>이거요?</b><br><span style=\"font-size:12px;color:#888\">→ 这个吗？ — This one? (pointing)</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>도라미요</b> → [도라미요] 无特殊</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "그렇게 폭발하고 한동안은 조용해요", "cn": "那次爆发之后一直挺安静的", "en": "→ After exploding like that, it's been quiet for a while", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그렇게</b> — 那样地(like that/in that way) ｜ <b>폭발하다</b> — 爆发(to explode/to burst out) ｜ <b>한동안</b> — 一段时间(for a while/for some time) ｜ <b>조용하다</b> — 安静(to be quiet/to be calm)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>폭발하고 나서</b> — 爆发之后 (after exploding)<br><span style=\"font-size:12px;color:#555\">→ 그는 폭발하고 나서 후회했어요 — 他爆发之后后悔了 — He regretted it after blowing up.</span><br><br>② <b>한동안 조용하다</b> — 安静了一段时间 (to be quiet for a while)<br><span style=\"font-size:12px;color:#555\">→ 그 사건 후 한동안 조용했어요 — 那件事之后安静了一段时间 — It was quiet for a while after that incident.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>그렇게 말하고 나서 후회했어요</b><br><span style=\"font-size:12px;color:#888\">→ 那样说了之后后悔了 — I regretted saying that.</span><br><br>② <b>폭발하는 게 항상 좋은 건 아니에요</b><br><span style=\"font-size:12px;color:#888\">→ 爆发并不总是好事 — Exploding isn't always a good thing.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-고</b> 连接词尾 —— ① 表\"…之后\"(时间先后) ② 表\"并且\"(并列)。此处\"폭발하고\"意为\"爆发之后\"。<br><b>-은</b> 话题助词 —— 「한동안은」中-ən起强调对比作用，强调\"这段时间内\"是安静的。<br><b>-아/어요</b> 非正式敬语体 —— 韩语口语中最常用的终结语尾，语气温和自然。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>밥을 먹고 영화를 봤어요</b><br><span style=\"font-size:12px;color:#888\">→ 吃完饭看了电影 — I ate and then watched a movie.</span><br><br>② <b>시험 끝나고 한동안 쉬었어요</b><br><span style=\"font-size:12px;color:#888\">→ 考完后休息了一阵子 — I rested for a while after the exam.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>폭발하고</b> → [폭빨하고] 紧音化(ㄱ+ㅂ→ㄲ+ㅃ)<br><b>조용해요</b> → [조용해요] 无特殊</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "안 보여요.", "cn": "没再出现了", "en": "→ It doesn't show anymore", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>안</b> — 不(否定副词)(not(negative adverb)) ｜ <b>보이다</b> — 被看见/显现(to be seen/to show up)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>안 보이다</b> — 看不见/不出现 (to not be seen)<br><span style=\"font-size:12px;color:#555\">→ 그 사람이 안 보여요 — 那个人看不见了 — I can't see that person anymore.</span><br><br>② <b>보이기 시작하다</b> — 开始出现 (to begin to show)<br><span style=\"font-size:12px;color:#555\">→ 징후가 보이기 시작했어요 — 征兆开始出现了 — Signs are starting to show.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>그동안 얼굴이 안 보였어요</b><br><span style=\"font-size:12px;color:#888\">→ 这段时间没见你露面 — I haven't seen you around lately.</span><br><br>② <b>아직 결과가 안 보여요</b><br><span style=\"font-size:12px;color:#888\">→ 还看不到结果 — I still can't see the result.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>안 + 动词/形容词</b> —— 안是表否定的副词，放在谓词前面，相当于中文\"不/没\"、英文\"not/don't\"。<br><b>보이다</b> —— 보다(看)的被动态，意为\"被看见/显现\"。韩语被动态常见词尾：-이-/-히-/-리-/-기-。<br>整句\"안 보여요\"字面\"不被看见\"，在此语境中将弱点拟人化，意为\"它不再出现了\"。短句有力，言简意赅。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>별이 안 보여요</b><br><span style=\"font-size:12px;color:#888\">→ 看不到星星 — The stars aren't visible.</span><br><br>② <b>문이 안 잠겨 있어요</b><br><span style=\"font-size:12px;color:#888\">→ 门没锁 — The door isn't locked.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>보여요</b> → [보여요] 无特殊</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "신경 안정제보다", "cn": "比镇静剂还管用——", "en": "→ Better than a sedative——", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>신경</b> — 神经(nerve) ｜ <b>안정제</b> — 镇静剂/安定剂(sedative/tranquilizer) ｜ <b>보다</b> — 比(比较助词)(than(comparative particle))</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>신경 안정제</b> — 镇静剂 (sedative)<br><span style=\"font-size:12px;color:#555\">→ 의사가 신경 안정제를 처방했어요 — 医生开了镇静剂 — The doctor prescribed a sedative.</span><br><br>② <b>[名词]보다</b> — 比…更 (more than...)<br><span style=\"font-size:12px;color:#555\">→ 어제보다 오늘이 더 더워요 — 今天比昨天更热 — Today is hotter than yesterday.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>이게 그거보다 더 좋아요</b><br><span style=\"font-size:12px;color:#888\">→ 这个比那个更好 — This is better than that.</span><br><br>② <b>약보다 휴식이 더 효과적이에요</b><br><span style=\"font-size:12px;color:#888\">→ 比吃药更有效的是休息 — Rest is more effective than medicine.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-보다</b> 比较助词 —— 接在名词/代词后，表示比较基准，意为\"比…更\"。常与더(更)搭配：X보다 Y가 더…\"Y比X更…\"。<br>注意：这句台词是一个<b>未完句</b>！实际在表达\"比镇静剂更有效\"时只说前半截\"比镇静剂……\"，后半句让听者根据上下文补充。这种留白手法在韩剧台词中常用于制造幽默或营造轻松氛围。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>한국어가 영어보다 어려워요</b><br><span style=\"font-size:12px;color:#888\">→ 韩语比英语难 — Korean is harder than English.</span><br><br>② <b>기차보다 비행기가 빨라요</b><br><span style=\"font-size:12px;color:#888\">→ 飞机比火车快 — Airplanes are faster than trains.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>신경 안정제</b> → [신경 안정제] 无特殊<br><b>보다</b> → [보다] 无特殊</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "그렇게 한 번 터뜨리는 게 효과가 있나 봐요", "cn": "看来爆发一次反而更有效呢", "en": "→ Looks like letting it burst out once actually works better", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그렇게</b> — 那样地(like that) ｜ <b>한 번</b> — 一次(once/one time) ｜ <b>터뜨리다</b> — 引爆/爆发(to burst/to let out) ｜ <b>효과</b> — 效果(effect) ｜ <b>있다</b> — 有(to have/to exist) ｜ <b>보다</b> — 看/推测(to see/to guess)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>한 번 터뜨리다</b> — 爆发一次 (to let it burst once)<br><span style=\"font-size:12px;color:#555\">→ 스트레스를 한 번 터뜨리는 게 좋아요 — 把压力发泄出来比较好 — It's good to let out the stress once in a while.</span><br><br>② <b>효과가 있다</b> — 有效果 (to be effective)<br><span style=\"font-size:12px;color:#555\">→ 이 약이 효과가 있어요 — 这个药有效 — This medicine is effective.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>한 번 해 보는 게 어때요?</b><br><span style=\"font-size:12px;color:#888\">→ 试一次怎么样？ — How about giving it a try?</span><br><br>② <b>그렇게 하는 게 더 나아요</b><br><span style=\"font-size:12px;color:#888\">→ 那样做更好 — Doing it that way is better.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-는 게</b> —— 动词冠形形+것+이的缩略。动词现在时冠形形-는 + 것이 → -는 게，意为\"做…这件事\"。<br><b>-(으)ㄴ가 보다 / -나 보다</b>「看来是…」—— 基于观察的推测。此处\"효과가 있나 봐요\"中，있다(动词)→ 있나 보다。<br><b>터뜨리다 vs 폭발하다</b>：터뜨리다强调\"人为地引爆/发泄\"，更口语化、主动；폭발하다可用于物理爆炸或情绪爆发，中性词。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>노래하는 게 취미예요</b><br><span style=\"font-size:12px;color:#888\">→ 唱歌是我的爱好 — Singing is my hobby.</span><br><br>② <b>이 방법이 더 효과가 있나 봐요</b><br><span style=\"font-size:12px;color:#888\">→ 这个方法似乎更有效 — This method seems to be more effective.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>터뜨리는</b> → [터뜨리는] 固有紧音<br><b>게</b> → [게] 것이缩略<br><b>있나</b> → [인나] ㅆ→ㄴ鼻音化</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "그렇다고 아무 데서나 그때처럼 폭발하지는 마요", "cn": "但别跟那天一样，哪儿都乱爆发", "en": "→ But don't just explode anywhere like you did that day", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그렇다고</b> — 虽说如此(even so/having said that) ｜ <b>아무 데서나</b> — 无论哪里/到处(anywhere/wherever) ｜ <b>그때처럼</b> — 像那时一样(like that time) ｜ <b>폭발하다</b> — 爆发(to explode) ｜ <b>말다</b> — 不要/别(to stop/don't)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>아무 데서나</b> — 无论哪里 (anywhere/no matter where)<br><span style=\"font-size:12px;color:#555\">→ 아무 데서나 담배 피우지 마요 — 别随地抽烟 — Don't smoke anywhere.</span><br><br>② <b>-지 마요</b> — 不要做… (don't do...)<br><span style=\"font-size:12px;color:#555\">→ 걱정하지 마요 — 别担心 — Don't worry.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>아무 데서나 쓰레기를 버리지 마요</b><br><span style=\"font-size:12px;color:#888\">→ 不要随地扔垃圾 — Don't throw trash just anywhere.</span><br><br>② <b>그렇게 걱정하지는 마요</b><br><span style=\"font-size:12px;color:#888\">→ 别那么担心 — Don't worry like that.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>그렇다고</b>「虽说如此」—— 그렇다(那样)+-다고(间接引用)的凝固用法。先承认前述事实，再提出相反主张。类似英语\"Having said that / That being said\"。<br><b>-지 마(요)</b>「不要做…」—— 否定命令形：动词词干 + -지 말다 + -아/어요。말+아요→마요。<br><b>-는</b> 强调助词 「하지는」—— 는附加在\"하지\"后，强调\"别做某事\"，带有对比意味。<br>全句逻辑：先承认\"爆发有效\"(그렇다고)，但(아무 데서나 그때처럼)别像那天那样随时随地乱爆发。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>비싸다고 해도 사지 마요</b><br><span style=\"font-size:12px;color:#888\">→ 虽说贵但也不要买 — Don't buy it even if they say it's expensive.</span><br><br>② <b>수업 시간에 떠들지 마요</b><br><span style=\"font-size:12px;color:#888\">→ 上课不要讲话 — Don't talk during class.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>그렇다고</b> → [그럭따고] 紧音化<br><b>폭발하지는</b> → [폭빨하지는] 紧音化(ㄱ+ㅂ→ㄲ+ㅃ)<br><b>마요</b> → [마요] 말+아요缩略</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "조심해야죠.", "cn": "是该注意点", "en": "→ I should be careful", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>조심하다</b> — 小心/注意(to be careful/cautious)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>조심해야죠</b> — 是该小心点吧 (I should be careful, right?)<br><span style=\"font-size:12px;color:#555\">→ 앞으로는 조심해야죠 — 以后是该小心点 — I should be more careful from now on.</span><br><br>② <b>조심하지 않다</b> — 不小心 (to not be careful)<br><span style=\"font-size:12px;color:#555\">→ 조심하지 않으면 다쳐요 — 不小心的话会受伤 — If you're not careful, you'll get hurt.</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>건강을 위해 조심해야죠</b><br><span style=\"font-size:12px;color:#888\">→ 为了健康是该注意的 — I should take care of my health.</span><br><br>② <b>그렇게 말하면 안 되죠</b><br><span style=\"font-size:12px;color:#888\">→ 不能那样说吧 — You shouldn't say that.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-아/어야죠</b> = -아/어야지요的缩略形 —— 由三个部分构成：<br>① -아/어야(条件\"应该/必须\")<br>② -지(自我确认或感叹)<br>③ -요(敬语)<br>整体含义\"应该…吧/是该…啊\"。表达\"理所当然的共识\"——说话人认为对方也会赞同。<br>类似英语\"I'd better... / I ought to...\"。在此对话中，听取对方劝告后，用此句式表达\"确实如此，是该这么做\"的赞同态度。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>일찍 자야죠</b><br><span style=\"font-size:12px;color:#888\">→ 是该早点睡的 — I should go to bed early.</span><br><br>② <b>열심히 공부해야죠</b><br><span style=\"font-size:12px;color:#888\">→ 是该努力学习的 — I should study hard.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>조심해야죠</b> → [조시매야죠] ㅎ弱化: 하→[아]→[애], 해야实际发成매야或애야</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "그쪽 약점은 어떻게 됐어요?", "cn": "你那边的弱点怎么样了？", "en": "→ What happened to your weakness?", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>그쪽</b> — 那边/您(that side/you) ｜ <b>약점</b> — 弱点(weakness) ｜ <b>어떻게</b> — 怎么样/如何(how/in what way) ｜ <b>되다</b> — 成为/变成(to become/to turn out)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>약점은 어떻게 되다</b> — 弱点怎么样了 (what happened to the weakness)<br><span style=\"font-size:12px;color:#555\">→ 네 약점은 어떻게 됐어? — 你的弱点怎么样了？ — What happened to your weakness?</span><br><br>② <b>어떻게 됐어요?</b> — 怎么样了？ (How did it turn out?)<br><span style=\"font-size:12px;color:#555\">→ 그 일은 어떻게 됐어요? — 那件事怎么样了？ — How did that matter turn out?</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>결과는 어떻게 됐어요?</b><br><span style=\"font-size:12px;color:#888\">→ 结果怎么样了？ — How did the result turn out?</span><br><br>② <b>그쪽 일은 잘 됐어요?</b><br><span style=\"font-size:12px;color:#888\">→ 你那边的事顺利吗？ — Did things work out on your end?</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-은</b> 话题助词 —— 「약점은」用-은引出话题，意为\"关于弱点(这件事)\"。<br><b>어떻게 되다</b>「变得怎么样/结果如何」—— 어떻게(怎么)+되다(成为)的惯用搭配，常用于询问某事的进展或最终结果。<br><b>됐어요</b> = 되었어요的缩略形，表过去完成时。<br>注意：此句与前面的\"그래서 지금은 좀 어때요? 당신 약점\"呼应——A之前被反问后没直接回答，现在反过来问B，形成对话的对称结构。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>면접은 어떻게 됐어요?</b><br><span style=\"font-size:12px;color:#888\">→ 面试怎么样了？ — How did the interview go?</span><br><br>② <b>그쪽 계획은 어떻게 됐어요?</b><br><span style=\"font-size:12px;color:#888\">→ 你那边的计划怎么样了？ — What happened to your plan?</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>어떻게</b> → [어떠케] 无特殊<br><b>됐어요</b> → [돼써요] 元音缩合(되+었어요→됐어요)</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}, {"kr": "결혼식 날짜는 잡혔고 상견례다 뭐다 끌려다니기 전에 어디로 튈까 궁리 중입니다", "cn": "婚礼日期算是定下来了，在被拖去见双方家长之前，正想着要逃哪儿去呢。", "en": "→ The wedding date is set, and I'm thinking about where to run before being dragged to see both families.", "exp": "<div class=\"ei\">📌<b>单词</b><br><span class=\"g\"><b>결혼식</b> — 婚礼(wedding ceremony) ｜ <b>날짜</b> — 日期(date) ｜ <b>잡히다</b> — 被定下来(잡다被动态)(to be set/to be fixed)</span></div>\n    <div class=\"ei\">💡<b>常用搭配</b><br><span class=\"g\">① <b>날짜가 잡히다</b> — 日期定下来 (the date is set)<br><span style=\"font-size:12px;color:#555\">→ 결혼 날짜가 잡혔어요 — 婚礼日期定了 — The wedding date has been set.</span><br><br>② <b>결혼식 날짜</b> — 婚礼日期 (wedding date)<br><span style=\"font-size:12px;color:#555\">→ 결혼식 날짜를 언제로 할까요? — 婚礼定在哪天？ — When should we set the wedding date?</span></span></div>\n    <div class=\"ei\">✏️<b>举个栗子</b><br><span class=\"g\">① <b>약속이 잡혔어요</b><br><span style=\"font-size:12px;color:#888\">→ 约好了 — An appointment has been made.</span><br><br>② <b>회의 일정이 아직 안 잡혔어요</b><br><span style=\"font-size:12px;color:#888\">→ 会议日程还没定 — The meeting schedule hasn't been set yet.</span></span></div>\n    <div class=\"ei\">🔧<b>句型接口</b><br><span class=\"g\"><b>-히- 被动态</b> —— 잡다(抓/定) → 잡히다(被抓住/被定下)。<br>韩语常见被动词尾：-이-/-히-/-리-/-기-。잡다属于-히-类。<br>잡히다的两个主要含义：① 物理上\"被抓住\"② 抽象上\"被定下(日期/约定)\"，后者\"날짜가 잡히다\"是常用搭配。<br><b>-고</b> 连接词尾(未完) —— 此处用在句末，暗示后面还有话要说，类似英语\"and...\"，留下悬念。<br>注意：这句也是不完句，用-고故意不说完，让对话有延续的空间。</span></div>\n    <div class=\"ei\">📝<b>来点例句</b><br><span class=\"g\">① <b>문이 잠겼어요</b><br><span style=\"font-size:12px;color:#888\">→ 门被锁上了 — The door is locked.</span><br><br>② <b>계획이 다 세워졌어요</b><br><span style=\"font-size:12px;color:#888\">→ 计划都定好了 — The plan has all been set up.</span></span></div>\n    <div class=\"ei\">🔊<b>读音变化</b><br><span class=\"g\"><b>날짜는</b> → [날짜는] 固有紧音<br><b>잡혔고</b> → [자펃꼬] 送气化(ㅂ+ㅎ→ㅍ) + 紧音化(ㄱ→ㄲ)</span>", "prac": "<div class=\"ei\"><span class=\"icn\">❓</span>练习</div>"}]
};
var curEp = 0, curLesson = 0, curLine = 0, curSide = 0;
function showPage(p){
  var pages = ["cover","toc","detail"];
  pages.forEach(function(x){
    var el = document.getElementById(x+"Page");
    if(el) el.style.display = (x===p) ? (x==="cover"?"flex":"block") : "none";
  });
}
function renderToc(){
  var h = "";
  EP_DATA.forEach(function(ep, ei){
    h += '<div class="ep-tg" onclick="toggleEp('+ei+')"><span class="ar" id="ar'+ei+'">&#x25b8;</span><span class="nm">'+ep.name+'</span><span class="ct">'+ep.lessons.length+'课</span></div><div class="ls" id="ls'+ei+'">';
    ep.lessons.forEach(function(ls, li){
      h += '<div class="lii" onclick="openLesson('+ei+','+li+')"><span class="no">'+ls.num+'</span><span class="tt">'+ls.title+'</span><span class="st">精讲</span></div>';
    });
    h += '</div>';
  });
  document.getElementById("epList").innerHTML = h;
}
function toggleEp(ei){
  document.getElementById("ls"+ei).classList.toggle("op");
  var ar = document.getElementById("ar"+ei);
  if(ar) ar.classList.toggle("op");
}
function openLesson(ei, li){
  curEp = ei; curLesson = li; curLine = 0; curSide = 0;
  showPage("detail");
  renderDetail();
}
function renderDetail(){
  var ep = EP_DATA[curEp];
  var ls = ep.lessons[curLesson];
  document.getElementById("detailEp").textContent = ep.name;
  document.getElementById("detailTitle").textContent = ls.num+"课 · "+ls.title;
  document.getElementById("detailLabel").textContent = curSide===0 ? "第1页 · 台词精讲" : "第2页 · 台词运用";
  var data = LESSON_DATA[ls.num];
  if(data && data.lines && data.lines.length > 0){
    var line = data.lines[curLine] || data.lines[0];
    document.getElementById("lineKr").textContent = line.kr;
    document.getElementById("lineCn").textContent = "→ "+line.cn;
    document.getElementById("lineEn").textContent = "→ "+line.en;
    document.getElementById("contentArea").innerHTML = curSide===0 ? line.exp : line.prac;
    document.getElementById("pageFooter").textContent = "第"+(curLine+1)+"句/共"+data.lines.length+"句 · 第"+(curSide+1)+"页";
  } else {
    document.getElementById("lineKr").textContent = ls.num+"课 · "+ls.title;
    document.getElementById("lineCn").textContent = "内容待补充";
    document.getElementById("lineEn").textContent = "";
    document.getElementById("contentArea").innerHTML = '<div class="ph">&#x270d;&#xfe0f; 内容待补充</div>';
    document.getElementById("pageFooter").textContent = "";
  }
}
document.getElementById("flipBtn").onclick = function(){curSide=curSide===0?1:0;renderDetail()};
document.getElementById("prevBtn").onclick = function(){if(curSide===1){curSide=0;renderDetail();return}if(curLesson>0){curLesson--;curSide=1;renderDetail()}};
document.getElementById("nextBtn").onclick = function(){if(curSide===0){curSide=1;renderDetail();return}if(curLesson<EP_DATA[curEp].lessons.length-1){curLesson++;curSide=0;renderDetail()}};
renderToc();
showPage("cover");
</script>
</body>
</html>
