<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,maximum-scale=1">
<title>韩语小测验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;padding:20px;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.card{width:390px;background:#0f0f1a;border-radius:24px;overflow:hidden}
.video-area{position:relative;background:#000;height:480px;display:flex;align-items:center;justify-content:center}
.video-area video{width:100%;height:100%;object-fit:cover}
.quiz-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.quiz-overlay.hidden{display:none}
.q-label{font-size:12px;color:#FFD700;letter-spacing:2px;margin-bottom:12px}
.q-text{font-size:20px;color:#fff;font-weight:700;margin-bottom:24px;line-height:1.5}
.options{width:100%;display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.08);color:#ddd;font-size:15px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.3s}
.opt:active{transform:scale(.97)}
.opt.correct{background:rgba(46,204,113,.2);border-color:#2ecc71;color:#2ecc71}
.opt.wrong{background:rgba(231,76,60,.2);border-color:#e74c3c;color:#e74c3c}
.opt.reveal-correct{background:rgba(46,204,113,.15);border-color:#2ecc71}
.timer{font-size:42px;font-weight:900;color:#fff;margin-bottom:20px}
.answer-section{display:none;padding:20px}
.answer-section.show{display:block}
.answer-kr{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.answer-cn{font-size:15px;color:#aaa;margin-bottom:16px}
.word-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.w-item{background:rgba(255,255,255,.06);border-radius:10px;padding:10px;text-align:center}
.w-item .kr{font-size:16px;font-weight:700;color:#FFD700}
.w-item .cn{font-size:12px;color:#888;margin-top:2px}
.cta{display:block;width:100%;padding:14px;margin-top:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center}
</style>
</head>
<body>
<div class="card">
<div class="video-area">
  <video id="clip" src="/korean/videos/scene01_4K.mp4#t=6,11" muted playsinline></video>
  <div class="quiz-overlay" id="quizOverlay">
    <div class="q-label">🎯 听听TA在说什么？</div>
    <div class="timer" id="timer">3</div>
    <div class="q-text" id="questionText">这个女生说了什么？</div>
    <div class="options" id="options">
      <div class="opt" data-idx="0" onclick="checkAnswer(0)">😖 我腿疼</div>
      <div class="opt" data-idx="1" onclick="checkAnswer(1)">😍 你好帅</div>
      <div class="opt" data-idx="2" onclick="checkAnswer(2)">😭 我饿了</div>
    </div>
  </div>
</div>

<div class="answer-section" id="answerSection">
  <div style="margin-bottom:12px">
    <span style="background:#2ecc71;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">✅ 正解</span>
  </div>
  <div class="answer-kr">아 다리 아파</div>
  <div class="answer-cn">啊，腿疼</div>
  
  <div style="font-size:14px;font-weight:700;color:#FFD700;margin:14px 0 10px">📌 单词拆解</div>
  <div class="word-grid">
    <div class="w-item"><div class="kr">아</div><div class="cn">啊（感叹词）</div></div>
    <div class="w-item"><div class="kr">다리</div><div class="cn">腿</div></div>
    <div class="w-item"><div class="kr">아파</div><div class="cn">疼（아프다的活用）</div></div>
  </div>

  <div style="font-size:14px;font-weight:700;color:#FFD700;margin:14px 0 10px">💡 还能怎么说</div>
  <div style="color:#ddd;font-size:14px;line-height:1.8">
    머리 아파 → 头疼<br>
    배 아파 → 肚子疼<br>
    등이 아파요 → 背疼（敬语）
  </div>

  <button class="cta" onclick="alert('下一题功能开发中！')">下一题 →</button>
</div>
</div>

<script>
var video=document.getElementById('clip');
var quizOverlay=document.getElementById('quizOverlay');
var answerSection=document.getElementById('answerSection');
var timer=document.getElementById('timer');
var options=document.querySelectorAll('.opt');
var count=3;

function startQuiz(){
  video.currentTime=6;
  video.play();
  var t=setInterval(function(){
    count--;
    timer.textContent=count;
    if(count<=0){
      clearInterval(t);
      video.pause();
      quizOverlay.classList.remove('hidden');
    }
  },1000);
}

function checkAnswer(idx){
  options.forEach(function(o){o.style.pointerEvents='none'});
  if(idx===0){
    options[0].classList.add('correct');
  }else{
    options[idx].classList.add('wrong');
    options[0].classList.add('reveal-correct');
  }
  setTimeout(function(){
    quizOverlay.classList.add('hidden');
    answerSection.classList.add('show');
    video.currentTime=6;
    video.play();
  },1500);
}

// Auto start
startQuiz();
</script>
</body>
</html>
