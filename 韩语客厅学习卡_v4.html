<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛋️ 거실 韩语客厅学习卡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c1810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'Noto Sans KR', 'PingFang SC', sans-serif;
    padding: 10px;
  }
  .card {
    background: #f5f0e8;
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 480px;
    width: 100%;
  }
  .card-title {
    text-align: center;
    padding: 2px 0 8px;
    font-size: 17px;
    font-weight: 700;
    color: #3d2b1f;
    letter-spacing: 2px;
  }
  .card-title small {
    font-weight: 400;
    font-size: 11px;
    color: #8b7355;
  }

  /* ====== 场景 ====== */
  .scene-wrapper {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    background: #f0e8d8;
  }
  .scene-wrapper svg {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }

  .interact-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ====== 点击区（扩大但肉眼不可见） ====== */
  .item-zone {
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    z-index: 5;
  }
  .item-zone:active { background: rgba(192,57,43,0.1); border-radius: 8px; }
  .item-zone.played { background: rgba(39,174,96,0.08); border-radius: 8px; }

  /* ====== 韩文标签（缩小 + 偏移放置） ====== */
  .klabel {
    position: absolute;
    pointer-events: none;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid #d4a574;
    border-radius: 6px;
    padding: 2px 7px;
    text-align: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    font-size: 12px;
    font-weight: 700;
    color: #2c5f2d;
    line-height: 1.4;
    white-space: nowrap;
    z-index: 4;
    transition: transform 0.15s;
  }
  .item-zone.played + .klabel { border-color: #27ae60; }

  /* 小连接线（从标签指向物品） */
  .dot-line {
    position: absolute;
    pointer-events: none;
    z-index: 3;
  }

  /* ====== 发音弹窗 ====== */
  .speech-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 18px 32px;
    border-radius: 16px;
    font-size: 28px;
    font-weight: 700;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    text-align: center;
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.08);
  }
  .speech-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .speech-popup .sub {
    display: block;
    font-size: 14px;
    font-weight: 400;
    color: #ccc;
    margin-top: 2px;
  }

  /* ====== 底部 ====== */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }
  .hint-text { font-size: 11px; color: #8b7355; }
  .play-all-btn {
    background: #fff;
    border: 1.5px solid #d4a574;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: #8b7355;
    cursor: pointer;
    transition: all 0.2s;
  }
  .play-all-btn:hover { background: #fff8f0; border-color: #c0392b; color: #c0392b; }
  .browser-note {
    text-align: center;
    margin-top: 6px;
    font-size: 10px;
    color: #bbb;
  }

  /* ====== 场景练习按钮 ====== */
  .practice-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(231,76,60,0.35);
    transition: all 0.2s;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 4px;
    letter-spacing: 1px;
    pointer-events: auto;
  }
  .practice-btn:hover { transform: translateY(-2px); }
  .practice-btn:active { transform: translateY(0); }

  /* ====== 模态弹窗 ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.6);
    z-index:200;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px 22px 22px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    animation: modalIn .3s ease;
  }
  @keyframes modalIn { from {transform:scale(.9); opacity:0} to {transform:scale(1); opacity:1} }
  .modal-box .big { font-size: 40px; margin-bottom: 6px; }
  .modal-box h2 { font-size: 17px; color: #3d2b1f; margin-bottom: 4px; }
  .modal-box p { font-size: 12px; color: #666; line-height: 1.6; }
  .modal-actions { display:flex; gap:10px; margin-top:16px; justify-content:center; }
  .modal-actions button {
    padding:8px 20px; border-radius:50px; border:none;
    font-size:13px; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .btn-primary { background:linear-gradient(135deg,#2c5f2d,#1e6f20); color:white; }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary { background:#eee; color:#555; }
  .btn-secondary:hover { background:#ddd; }

  @media (max-width:400px) {
    .card { padding: 10px; }
    .card-title { font-size: 15px; }
    .klabel { font-size: 11px; padding: 1px 5px; }
    .practice-btn { padding: 6px 12px; font-size: 11px; }
    .speech-popup { font-size: 24px; padding: 14px 24px; }
  }
</style>

<script>
// ====== 韩语发音（简化版） ======
let ttsReady = false;

function initTTS() {
  if (!window.speechSynthesis) return false;
  // 触发语音加载
  window.speechSynthesis.getVoices();
  ttsReady = true;
  return true;
}

function speakKorean(text) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) {
      resolve(false);
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    utter.rate = 0.8;
    utter.volume = 1;
    utter.onend = () => resolve(true);
    utter.onerror = () => resolve(false);
    window.speechSynthesis.speak(utter);
  });
}

// 初始化
initTTS();

// ====== 弹窗 ======
const popup = document.getElementById('speechPopup');
const popupKo = document.getElementById('popupKo');
const popupCn = document.getElementById('popupCn');
let popupTimer = null;

function showPopup(ko, cn) {
  popupKo.textContent = ko;
  popupCn.textContent = cn || '';
  popup.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => popup.classList.remove('show'), 1000);
}

// ====== 绑定点击 ======
const itemMap = {
  '소파': '沙发', '텔레비전': '电视', '탁자': '茶几', '창문': '窗户',
  '시계': '时钟', '그림': '画', '스탠드': '台灯', '에어컨': '空调',
  '컵': '杯子', '리모컨': '遥控器', '책': '书', '꽃병': '花瓶',
  '러그': '地毯', '커튼': '窗帘'
};

document.querySelectorAll('.item-zone').forEach(el => {
  el.addEventListener('click', async function(e) {
    e.stopPropagation();
    const ko = this.dataset.ko;
    const cn = itemMap[ko] || '';

    document.querySelectorAll('.item-zone').forEach(z => z.classList.remove('played'));
    this.classList.add('played');

    showPopup(ko, cn);
    await speakKorean(ko);
  });
});

// ====== 全部朗读 ======
document.getElementById('playAllBtn').addEventListener('click', async function() {
  const zones = document.querySelectorAll('.item-zone');
  for (let i = 0; i < zones.length; i++) {
    const z = zones[i];
    zones.forEach(z2 => z2.classList.remove('played'));
    z.classList.add('played');
    const ko = z.dataset.ko;
    const cn = itemMap[ko] || '';
    showPopup(ko, cn);
    await speakKorean(ko);
    await new Promise(r => setTimeout(r, 500));
  }
  zones.forEach(z => z.classList.remove('played'));
});

// ====== 弹窗控制 ======
document.getElementById('practiceBtn').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.add('active');
});
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
