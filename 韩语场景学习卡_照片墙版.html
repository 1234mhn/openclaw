let zoomTimer=null;
function zoomPhoto(el){document.querySelectorAll('.polaroid.zoomed').forEach(p=>p.classList.remove('zoomed'));el.classList.add('zoomed');clearTimeout(zoomTimer);zoomTimer=setTimeout(()=>el.classList.remove('zoomed'),500)}

function showComing(name){const m=document.getElementById('modalOverlay');m.querySelector('.big').textContent='🔜';m.querySelector('h2').textContent=name+' 即将开放';m.querySelector('p').textContent='这个场景正在绘制中，敬请期待 🐻';m.classList.add('active')}

// Bind all polaroid clicks
document.querySelectorAll('.polaroid').forEach(el=>{if(el.querySelector('.pko').textContent!=='거실'){el.addEventListener('click',function(e){if(e.target.closest('.polaroid'))zoomPhoto(this);showComing(this.querySelector('.pko').textContent)})}})

function openScene(s){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('sceneLiving').classList.add('active')}
function goHome(){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('homePage').classList.add('active');document.querySelectorAll('.item-zone').forEach(z=>z.classList.remove('played'))}

function playAudio(text){return new Promise((resolve)=>{
  const b64=AUDIO_DATA[text];
  if(!b64){resolve(false);return}
  const a=new Audio('data:audio/mp3;base64,'+b64);
  a.volume=1;
  a.onended=()=>resolve(true);
  a.onerror=()=>resolve(false);
  a.play().catch(()=>{
    if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=0.8;u.onend=()=>resolve(true);u.onerror=()=>resolve(false);window.speechSynthesis.speak(u)}
    else resolve(false)
  })
})}

function showPopup(ko,cn){popupKo.textContent=ko;popupCn.textContent=cn||'';popup.classList.add('show');clearTimeout(pt);pt=setTimeout(()=>popup.classList.remove('show'),1000)}

document.querySelectorAll('.item-zone').forEach(el=>{el.addEventListener('click',async function(e){e.stopPropagation();document.querySelectorAll('.item-zone').forEach(z=>z.classList.remove('played'));this.classList.add('played');showPopup(this.dataset.ko,itemMap[this.dataset.ko]||'');await playAudio(this.dataset.ko)})});

function playAll(scene){const zones=document.getElementById(scene+'Layer').querySelectorAll('.item-zone');(async()=>{for(const z of zones){document.querySelectorAll('.item-zone').forEach(x=>x.classList.remove('played'));z.classList.add('played');showPopup(z.dataset.ko,itemMap[z.dataset.ko]||'');await playAudio(z.dataset.ko);await new Promise(r=>setTimeout(r,600))}document.querySelectorAll('.item-zone').forEach(z=>z.classList.remove('played'))})()}

function showPractice(){document.getElementById('modalOverlay').classList.add('active')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
</script>
