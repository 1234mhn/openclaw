<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语口语 · 情景练习</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: #f5f2eb;
  color: #2c2c2c;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 70px;
}

/* ====== DARK MODE ====== */
:root {
  --bg-primary: #f5f2eb;
  --bg-card: #fff;
  --bg-card-alt: #faf8f5;
  --bg-hover: #f0ece6;
  --text-primary: #2c2c2c;
  --text-secondary: #555;
  --text-muted: #999;
  --text-very-muted: #bbb;
  --text-light: #aaa;
  --border-light: #f0ece6;
  --border-medium: #e8e0d8;
  --accent-brown: #6f4e37;
  --accent-brown-light: #a0765a;
  --accent-orange: #d35400;
  --shadow-card: 0 2px 12px rgba(111, 78, 55, 0.08);
  --shadow-nav: 0 -2px 12px rgba(0,0,0,0.08);
  --overlay-bg: rgba(0,0,0,0.4);
  --toast-bg: rgba(44,44,44,0.9);
  --toast-color: #fff;
  --modal-bg: #fff;
  --nav-bg: #fff;
  --fill-bar-bg: #f0ece6;
  --green-bg: #e8f5e9;
  --green-text: #2c7a5c;
  --red-bg: #fdecea;
  --red-text: #c0392b;
  --pulse-red: #ff4444;
  --quiz-btn-bg: #faf8f5;
  --collect-btn-bg: #faf8f5;
  --tag-bg: #ede8e2;
  --tag-color: #a0765a;
  --footer-color: #ccc;
  --speaker-color: #333;
  --card-arrow-color: #ccc;
}

body.dark-mode {
  --bg-primary: #1a1a2e;
  --bg-card: #252540;
  --bg-card-alt: #1e1e38;
  --bg-hover: #2a2a48;
  --text-primary: #e8e8f0;
  --text-secondary: #b8b8d0;
  --text-muted: #8888a8;
  --text-very-muted: #666688;
  --text-light: #7777a0;
  --border-light: #2a2a48;
  --border-medium: #3a3a58;
  --accent-brown: #c4956a;
  --accent-brown-light: #d4a57a;
  --accent-orange: #f0a050;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-nav: 0 -2px 12px rgba(0,0,0,0.4);
  --overlay-bg: rgba(0,0,0,0.6);
  --toast-bg: rgba(200,200,220,0.9);
  --toast-color: #1a1a2e;
  --modal-bg: #252540;
  --nav-bg: #252540;
  --fill-bar-bg: #2a2a48;
  --green-bg: #1a3a2e;
  --green-text: #6aea9e;
  --red-bg: #3a1a2e;
  --red-text: #f07070;
  --pulse-red: #ff6666;
  --quiz-btn-bg: #1e1e38;
  --collect-btn-bg: #1e1e38;
  --tag-bg: #3a3a58;
  --tag-color: #c4956a;
  --footer-color: #555577;
  --speaker-color: #d8d8e8;
  --card-arrow-color: #555577;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background 0.3s ease, color 0.3s ease;
}

/* Dark mode toggle in header */
.dark-toggle {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s;
}
.dark-toggle:active { background: rgba(255,255,255,0.35); }

/* Header */
.header {
  background: linear-gradient(135deg, #6f4e37 0%, #a0765a 100%);
  color: #fff;
  padding: 32px 20px 24px;
  text-align: center;
  position: relative;
}
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; letter-spacing: 2px; }

/* Page content areas */
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Container */
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 12px 16px;
  padding-bottom: 20px;
}

/* ====== SCENE PLAZA (Scene Cards) ====== */
.plaza-title {
  font-size: 18px;
  font-weight: 700;
  color: #6f4e37;
  padding: 8px 0 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.scene-card {
  background: var(--bg-card);
  border-radius: 16px;
  box-shadow: var(--shadow-card);
  padding: 20px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scene-card:active { transform: scale(0.98); box-shadow: 0 1px 6px rgba(111, 78, 55, 0.06); }

.scene-card .card-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.scene-card .card-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: #fef6ef;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.scene-card .card-icon.hotel-icon { background: #eef6f9; }
.scene-card .card-icon.airport-icon { background: #f0f0f5; }

.scene-card .card-info { flex: 1; min-width: 0; }
.scene-card .card-title {
  font-size: 17px;
  font-weight: 700;
  color: #333;
}
.scene-card .card-subtitle {
  font-size: 13px;
  color: #999;
  margin-top: 2px;
}
.scene-card .card-arrow {
  font-size: 18px;
  color: #ccc;
  flex-shrink: 0;
}

.scene-card .card-progress-area {
  display: flex;
  align-items: center;
  gap: 10px;
}
.scene-card .card-progress-bg {
  flex: 1;
  height: 6px;
  background: #f0ece6;
  border-radius: 3px;
  overflow: hidden;
}
.scene-card .card-progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.scene-card .card-progress-fill.coffee-bar { background: #d35400; }
.scene-card .card-progress-fill.hotel-bar { background: #2c7a5c; }
.scene-card .card-progress-fill.airport-bar { background: #4a6fa5; }
.scene-card .card-progress-label {
  font-size: 12px;
  color: #aaa;
  white-space: nowrap;
}

/* ====== SCENE DETAIL PAGE ====== */
.detail-header {
  background: var(--bg-card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-card);
  position: sticky;
  top: 0;
  z-index: 10;
}
.detail-back-btn {
  border: none;
  background: var(--bg-card-alt);
  color: var(--accent-brown);
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.detail-back-btn:active { background: #e0d8ce; }

.detail-title {
  font-size: 17px;
  font-weight: 700;
  color: #6f4e37;
  flex: 1;
}

/* Play All Button */
.play-all-area {
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.play-all-btn {
  flex: 1;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6f4e37 0%, #a0765a 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: opacity 0.15s;
}
.play-all-btn:active { opacity: 0.85; }
.play-all-btn.playing { opacity: 0.7; }
.play-all-btn .stop-icon { display: none; }
.play-all-btn.playing .play-icon { display: none; }
.play-all-btn.playing .stop-icon { display: inline; }
.play-all-btn.playing { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); }

/* Play All Progress */
.play-all-progress {
  font-size: 13px;
  color: #999;
  white-space: nowrap;
  min-width: 44px;
  text-align: center;
  line-height: 1;
}
.play-all-progress.active { color: #6f4e37; font-weight: 600; }

/* Section Title */
.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-brown);
  padding: 12px 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Dialog Card */
.dialog-card { transition: background 0.3s ease, box-shadow 0.3s ease;
  background: var(--bg-card);
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  padding: 4px 16px;
  margin-bottom: 20px;
}

.dialog-line {
  display: flex;
  align-items: flex-start;
  gap: 4px;
  padding: 12px 10px;
  border-bottom: 1px solid #f0ece6;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 8px;
  margin: 0 -8px;
  position: relative;
}
.dialog-line:last-child { border-bottom: none; }
.dialog-line:hover { background: #faf8f5; }
.dialog-line:active { background: #f0ece6; }

.dialog-line.speaking {
  background: #fef6ef;
  border-left: 3px solid #d35400;
  padding-left: 7px;
}

.dialog-line-content {
  flex: 1;
  min-width: 0;
  padding-right: 8px;
  word-break: break-word;
  overflow-wrap: break-word;
}
.dialog-line-content .chinese {
  word-break: break-word;
}

.dialog-line .speaker {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.dialog-line .speaker.barista,
.dialog-line .speaker.receptionist,
.dialog-line .speaker.staff { color: #6f4e37; }
.dialog-line .speaker.you { color: #2c7a5c; }

.dialog-line .english {
  font-size: 15px;
  color: #333;
  font-weight: 500;
  line-height: 1.5;
  padding-right: 0;
  word-break: break-word;
  overflow-wrap: break-word;
}
.dialog-line .english .highlight { color: #d35400; font-weight: 700; cursor: pointer; border-bottom: 2px dashed transparent; transition: border-color 0.15s; }
.dialog-line .english .highlight:hover { border-bottom-color: #d35400; }

.dialog-line .chinese {
  font-size: 13px;
  color: #999;
  margin-top: 2px;
}

.dialog-line .play-icon {
  display: none;
}

/* Action buttons for each dialog line — row layout, no overlap */
.dialog-line .line-actions {
  flex-shrink: 0;
  display: flex;
  flex-direction: row;
  gap: 4px;
  align-items: center;
  padding-top: 2px;
  margin-left: 6px;
}
.line-action-btn {
  width: 44px; height: 44px;
  min-width: 44px;
  border-radius: 50%;
  border: none;
  background: #f0ece6;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  position: relative;
}
.line-action-btn:active { transform: scale(0.9); }
.line-action-btn.faved { background: #fff3e0; }
.line-action-btn.recording { background: #ff4444; color: #fff; animation: pulse-red 0.8s infinite; }
@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Vocabulary Grid */
.vocab-grid { transition: background 0.3s ease;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.vocab-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(111, 78, 55, 0.06);
  padding: 12px;
}
.vocab-card .icon { font-size: 22px; margin-bottom: 4px; }
.vocab-card .word { font-size: 15px; font-weight: 700; color: #6f4e37; word-break: break-word; }
.vocab-card .meaning { font-size: 13px; color: #555; margin-top: 1px; word-break: break-word; }
.vocab-card .usage { font-size: 12px; color: #aaa; margin-top: 3px; line-height: 1.4; }

/* Bottom of detail page */
.detail-quiz-link {
  display: block;
  padding: 14px 20px;
  border-radius: 12px;
  background: linear-gradient(135deg, #6f4e37 0%, #a0765a 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  margin: 0 0 24px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.detail-quiz-link:active { opacity: 0.85; }

/* Modal Overlay */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.modal-overlay.show { opacity: 1; visibility: visible; }

/* Modal Sheet */
.modal-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--modal-bg);
  border-radius: 20px 20px 0 0;
  z-index: 201;
  max-height: 80vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
}
.modal-sheet.show { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: #ddd;
  border-radius: 2px;
  margin: 10px auto 6px;
}

.modal-header {
  padding: 6px 20px 12px;
  border-bottom: 1px solid #f0ece6;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 { font-size: 17px; font-weight: 700; color: #6f4e37; }
.modal-close {
  border: none;
  background: #f0ece6;
  color: #888;
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:active { background: #e0d8ce; }

.modal-body { padding: 12px 20px 28px; }

/* Word Card inside Modal */
.word-detail {
  background: #faf8f5;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}
.word-detail:last-child { margin-bottom: 0; }

.word-detail .wd-word {
  font-size: 18px;
  font-weight: 700;
  color: #d35400;
}
.word-detail .wd-phonetic {
  font-size: 13px;
  color: #888;
  margin-left: 8px;
}
.word-detail .wd-meaning {
  font-size: 14px;
  color: #555;
  margin-top: 6px;
}
.word-detail .wd-section {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #eee;
}
.word-detail .wd-section-title {
  font-size: 12px;
  font-weight: 600;
  color: #bbb;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.word-detail .wd-examples p,
.word-detail .wd-collocations p,
.word-detail .wd-usage p,
.word-detail .wd-compare p {
  font-size: 13px;
  color: #444;
  line-height: 1.6;
}
.word-detail .wd-examples .en { color: #d35400; }
.word-detail .wd-examples .zh { color: #999; }
.word-detail .wd-tag {
  display: inline-block;
  background: #ede8e2;
  color: #a0765a;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  margin: 2px 3px 2px 0;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--toast-bg);
  color: var(--toast-color);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--nav-bg);
  display: flex;
  box-shadow: var(--shadow-nav);
  z-index: 50;
  padding: 4px 0 env(safe-area-inset-bottom, 4px);
}

.nav-item {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  font-size: 11px;
  color: #aaa;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  border: none;
  background: none;
}
.nav-item .nav-icon { font-size: 20px; display: block; margin-bottom: 1px; }
.nav-item.active { color: #6f4e37; font-weight: 600; }
.nav-item:active { opacity: 0.6; }

/* Quiz Page */
.quiz-section {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(111, 78, 55, 0.08);
  padding: 20px;
  margin-bottom: 16px;
}

.quiz-scene-select {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.quiz-scene-btn {
  padding: 6px 14px;
  border-radius: 16px;
  border: 2px solid #e8e0d8;
  background: #faf8f5;
  font-size: 13px;
  font-weight: 600;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.quiz-scene-btn.active { background: #6f4e37; border-color: #6f4e37; color: #fff; }

.quiz-type-select {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.quiz-type-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: 2px solid #e8e0d8;
  background: #faf8f5;
  font-size: 13px;
  font-weight: 600;
  color: #888;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.quiz-type-btn.active { background: #6f4e37; border-color: #6f4e37; color: #fff; }

.quiz-question {
  padding: 16px 0;
  text-align: center;
}
.quiz-question .q-prompt { font-size: 13px; color: #999; margin-bottom: 8px; }
.quiz-question .q-english { font-size: 20px; font-weight: 700; color: #333; line-height: 1.5; margin-bottom: 4px; }
.quiz-question .q-chinese { font-size: 14px; color: #888; }
.quiz-question .q-word { font-size: 22px; font-weight: 700; color: #d35400; margin-bottom: 4px; }

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.quiz-option {
  padding: 12px 16px;
  border-radius: 10px;
  border: 2px solid #e8e0d8;
  background: #faf8f5;
  font-size: 14px;
  color: #333;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.selected { border-color: #6f4e37; background: #fef6ef; }
.quiz-option.correct { border-color: #2c7a5c; background: #e8f5e9; color: #2c7a5c; }
.quiz-option.wrong { border-color: #c0392b; background: #fdecea; color: #c0392b; }
.quiz-option:disabled { cursor: default; }

.quiz-progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.quiz-progress .qp-text { font-size: 13px; color: #999; }
.quiz-progress .qp-bar-bg {
  flex: 1;
  height: 4px;
  background: #eee;
  border-radius: 2px;
  margin: 0 12px;
  overflow: hidden;
}
.quiz-progress .qp-bar-fill {
  height: 100%;
  background: #6f4e37;
  border-radius: 2px;
  transition: width 0.3s ease;
}

.quiz-result {
  text-align: center;
  padding: 20px 0;
}
.quiz-result .qr-score { font-size: 48px; font-weight: 700; color: #6f4e37; }
.quiz-result .qr-label { font-size: 14px; color: #888; margin: 4px 0 8px; }
.quiz-result .qr-detail { font-size: 13px; color: #555; line-height: 1.6; }
.quiz-restart-btn {
  padding: 10px 28px;
  border-radius: 22px;
  border: none;
  background: #6f4e37;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  -webkit-tap-highlight-color: transparent;
}
.quiz-restart-btn:active { opacity: 0.8; }

/* Pronunciation check specific */
.pronun-area {
  padding: 16px 0;
  text-align: center;
}
.pronun-area .pr-sentence {
  font-size: 20px;
  font-weight: 700;
  color: #333;
  line-height: 1.5;
  margin-bottom: 16px;
}
.pronun-area .pr-rec-btn {
  width: 64px; height: 64px;

}
.pronun-area .pr-rec-btn:active { transform: scale(0.95); }
.pronun-area .pr-rec-btn.recording { background: #ff4444; border-color: #ff4444; animation: pulse-red 0.8s infinite; }
.pronun-area .pr-status { font-size: 13px; color: #999; margin-top: 8px; }
.pronun-area .pr-result {

}
.pronun-area .pr-result .pr-orig { font-size: 14px; color: #555; margin-bottom: 4px; }
.pronun-area .pr-result .pr-recognized { font-size: 14px; color: #333; margin-bottom: 4px; }
.pronun-area .pr-result .pr-error-words { font-size: 14px; }
.pronun-area .pr-result .pr-error-words .err { color: #c0392b; font-weight: 700; }
.pronun-area .pr-result .pr-error-words .ok { color: #2c7a5c; }
.pronun-area .pr-result .pr-score { font-size: 18px; font-weight: 700; margin-top: 8px; }
.pronun-area .pr-result .pr-orig .ok, .pronun-area .pr-result .pr-recognized .ok { color: #2c7a5c; font-weight: 600; }
.pronun-area .pr-result .pr-orig .err, .pronun-area .pr-result .pr-recognized .err { color: #c0392b; font-weight: 700; text-decoration: underline; }

/* Collection Page */

}

.collect-tabs {

}
.collect-tab-btn {

.collect-card {

.collect-card .cc-english { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 2px; }
.collect-card .cc-chinese { font-size: 13px; color: #999; margin-bottom: 6px; }
.collect-card .cc-meta { font-size: 12px; color: #bbb; display: flex; gap: 8px; align-items: center; }

.audio-item-info { flex: 1; }

  background: #faf8f5;

  display: flex;
  align-items: center;

/* Touch target sizing - ensure min 44px for mobile */
.nav-item { min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

}

/* Profile Page */
.profile-section {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(111, 78, 55, 0.08);
  padding: 20px;
  margin-bottom: 16px;
}
.profile-section .ps-title {
  font-size: 14px;
  font-weight: 600;
  color: #6f4e37;
  margin-bottom: 12px;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-card {
  background: #faf8f5;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.stat-card .sc-num { font-size: 28px; font-weight: 700; color: #6f4e37; }
.stat-card .sc-label { font-size: 12px; color: #888; margin-top: 2px; }

/* Review reminder */
.review-settings {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(111, 78, 55, 0.08);
  padding: 20px;
  margin-bottom: 16px;
}
.review-settings .rs-title {
  font-size: 14px;
  font-weight: 600;
  color: #6f4e37;
  margin-bottom: 12px;
}
.review-settings label {
  display: block;
  font-size: 14px;
  color: #333;
  margin-bottom: 8px;
}
.review-settings select, .review-settings input {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid #e8e0d8;
  border-radius: 10px;
  font-size: 14px;
  background: #faf8f5;
  margin-bottom: 12px;
  -webkit-appearance: none;
}
.review-settings button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #6f4e37;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.review-settings button:active { opacity: 0.8; }

/* Footer */
.footer {
  text-align: center;
  padding: 20px 16px 20px;
  font-size: 12px;
  color: #ccc;
  letter-spacing: 1px;
}
.footer .tag {
  display: inline-block;
  background: #ede8e2;
  color: #a0765a;
  padding: 4px 12px;
  border-radius: 14px;
  margin: 0 4px;
}

@media (max-width: 380px) {
  .vocab-grid { transition: background 0.3s ease; grid-template-columns: 1fr; }
  .dialog-line .english { font-size: 14px; }
}

@media (min-width: 480px) {
  .header h1 { font-size: 28px; }
  .header { padding: 40px 20px 28px; }
  .dialog-line .english { font-size: 16px; }
  .vocab-card .word { font-size: 16px; }
  .vocab-grid { transition: background 0.3s ease; gap: 12px; }
}

/* Speed Control */
.speed-control-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
}
.speed-label {
  font-size: 12px;
  color: var(--text-light);
  white-space: nowrap;
}
.speed-btn {
  padding: 4px 10px;
  border-radius: 12px;
  border: 2px solid var(--border-medium);
  background: var(--bg-card-alt);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  min-height: 32px;
  min-width: 44px;
}
.speed-btn.active {
  background: var(--accent-brown);
  border-color: var(--accent-brown);
  color: #fff;
}
.speed-btn:active { opacity: 0.7; }


/* Daily Quote */
.daily-quote {
  background: var(--bg-card);
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  padding: 16px 18px;
  margin-bottom: 20px;
  position: relative;
}
.daily-quote .dq-icon {
  position: absolute;
  top: -8px;
  left: 14px;
  font-size: 20px;
}
.daily-quote .dq-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-brown);
  line-height: 1.5;
  text-align: center;
  padding: 4px 0;
  font-style: italic;
}
.daily-quote .dq-ref {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 6px;
}
.daily-quote .dq-refresh {
  display: block;
  margin: 8px auto 0;
  border: none;
  background: var(--bg-card-alt);
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.daily-quote .dq-refresh:active { opacity: 0.7; }


/* Role Play Mode */
.roleplay-container { display: none; }
.roleplay-container.active { display: block; animation: fadeIn 0.3s ease; }

.roleplay-header {
  background: var(--bg-card);
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  padding: 16px;
  margin-bottom: 14px;
  text-align: center;
}
.roleplay-header .rp-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-brown);
}
.roleplay-header .rp-scene-name {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.roleplay-chat {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}
.rp-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}
.rp-bubble.staff {
  align-self: flex-start;
  background: var(--bg-card-alt);
  border-bottom-left-radius: 4px;
  color: var(--text-primary);
}
.rp-bubble.staff .rp-role-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent-brown);
  margin-bottom: 3px;
}
.rp-bubble.staff .rp-chinese {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}
.rp-bubble.player {
  align-self: flex-end;
  background: linear-gradient(135deg, #6f4e37 0%, #a0765a 100%);
  color: #fff;
  border-bottom-right-radius: 4px;
}
body.dark-mode .rp-bubble.player {
  background: linear-gradient(135deg, #8a6a50 0%, #b8967a 100%);
}
.rp-bubble.player .rp-role-label {
  font-size: 11px;
  font-weight: 700;
  opacity: 0.8;
  margin-bottom: 3px;
}

  margin-top: 3px;

  padding-top: 4px;
}

  font-size: 12px;
  opacity: 0.75;
  margin-top: 3px;
}

.roleplay-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 8px;
}
.roleplay-speak-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--accent-brown);
  background: var(--bg-card);
  font-size: 30px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(111, 78, 55, 0.2);
}

.roleplay-speak-btn.listening {
  background: var(--pulse-red);
  border-color: var(--pulse-red);
  animation: pulse-red 0.8s infinite;
}

  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

  background: var(--pulse-red);
  border-color: var(--pulse-red);
}

.roleplay-skip-btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid var(--border-medium);
  background: var(--bg-card-alt);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.roleplay-skip-btn:active { opacity: 0.7; }

.roleplay-status {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin: 10px 0;
}

.roleplay-exit-btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: var(--bg-hover);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;

      l.words.forEach(function(w) {
        // Find the word in the text (case insensitive)
        var idx = engText.toLowerCase().indexOf(w.toLowerCase());
        if (idx !== -1) {
          var actual = engText.substr(idx, w.length);
          highlightMap[actual] = w;
        }
      });

      var engHtml = '';

        // Apply highlights
        Object.keys(highlightMap).forEach(function(orig) {
          var w = highlightMap[orig];
          var escaped = orig.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          engHtml = engHtml.replace(new RegExp('(' + escaped + ')', 'gi'), function(m) {

  // ========== SPEECH ==========
  // Total number of pre-generated audio files (1.mp3 .. MAX_AUDIO_FILE.mp3)
  var MAX_AUDIO_FILE = 30;

  // Look up the audio index (1-based) for a dialog text, scanning sceneData in scene order.
  // Returns -1 if not found.
  function getAudioIndex(text) {
    var idx = 1;
    var keys = Object.keys(sceneData);
    for (var s = 0; s < keys.length; s++) {
      var lines = sceneData[keys[s]].lines;
      for (var l = 0; l < lines.length; l++) {
        if (lines[l].text === text) return idx;
        idx++;
      }
    }
    return -1;
  }

  function speakText(text, line, callback) {
    if (window.currentAudio) {
      window.currentAudio.pause();
      window.currentAudio = null;
    }
    document.querySelectorAll('.dialog-line.speaking').forEach(function(el) {
      el.classList.remove('speaking');
    });
    if (line && line.classList) {
      line.classList.add('speaking');
    }
    var audioIdx = getAudioIndex(text);
    if (audioIdx < 1 || audioIdx > MAX_AUDIO_FILE) {
      if (line && line.classList) line.classList.remove('speaking');
      if (callback) setTimeout(callback, 100);
      return;
    }
    var audioUrl = 'audio/' + audioIdx + '.mp3';
    var audio = new Audio(audioUrl);
    audio.playbackRate = currentSpeed || 1;
    window.currentAudio = audio;

    // Guard: ensure callback/cleanup fires at most once even if both
    // the play() catch and error/ended events fire simultaneously.
    var finished = false;
    function onFinished() {
      if (finished) return;
      finished = true;
      window.currentAudio = null;
      if (line && line.classList) line.classList.remove('speaking');
      if (callback) callback();
    }

    audio.addEventListener('ended', onFinished);
    audio.addEventListener('error', onFinished);
    audio.play().catch(onFinished);
  }

  // Rec buttons are bound during renderSceneDetail - no doc-level delegation needed

  function startRecording(line) {
    if (isRecording) {
      showToast('⏹️ 录音进行中，请稍候');
      return;
    }
    if (typeof navigator.mediaDevices === 'undefined' || typeof navigator.mediaDevices.getUserMedia === 'undefined') {
      showToast('❌ 您的浏览器不支持录音功能');
      return;
    }

    var id = line.getAttribute('data-id');
    var text = line.getAttribute('data-text');
    var recBtn = line.querySelector('.rec-btn');

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      isRecording = true;
      audioChunks = [];
      recBtn.classList.add('recording');
      recBtn.textContent = '⏺️';
      showToast('🔴 录音中... 会自动停止');

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = function() {
        isRecording = false;
        recBtn.classList.remove('recording');
        recBtn.textContent = '🎤';
        stream.getTracks().forEach(function(t) { t.stop(); });

        var blob = new Blob(audioChunks, { type: 'audio/webm' });
        // Compute audio duration from blob
        var tempUrl = URL.createObjectURL(blob);
        var tempAudio = new Audio();
        var durationSec = 0;
        tempAudio.onloadedmetadata = function() {
          durationSec = tempAudio.duration || 0;
          URL.revokeObjectURL(tempUrl);
        };
        tempAudio.src = tempUrl;

        var reader = new FileReader();
        reader.onloadend = function() {
          var base64Audio = reader.result;
          recordings[id] = {
            text: text,
            date: new Date().toISOString(),
            audio: base64Audio,
            duration: durationSec || Math.round(audioChunks.length * 0.5),
            scene: id.split('-')[0]
          };
          saveAll();
          showToast('✅ 录音已保存！去 📚 收藏 → 🎤 查看');
          updateProgress();
        };
        reader.readAsDataURL(blob);
      };

      setTimeout(function() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }, 10000);

      mediaRecorder.start();
    }).catch(function(err) {
      showToast('❌ 无法访问麦克风');
      console.error('getUserMedia error:', err);
    });
  }

  // ========== PROGRESS (per-scene + overall header) ==========
  function updateProgress() {
    // Per-scene card progress
    Object.keys(sceneData).forEach(function(sceneKey) {
      var lines = sceneData[sceneKey].lines;
      var total = lines.length;
      var done = 0;
      lines.forEach(function(l) {
        if (favs[l.id] || recordings[l.id]) done++;

  function generateMultipleChoice(lines) {
    var questions = [];
    lines.forEach(function(line) {
      if (line.words && line.words.length > 0) {
        var word = line.words[Math.floor(Math.random() * line.words.length)];
        var wordInfo = wordDB[word];
        if (!wordInfo) return;
        var allWords = Object.keys(wordDB).filter(function(w) { return w !== word; });
        var shuffled = allWords.sort(function() { return Math.random() - 0.5; }).slice(0, 3);
        if (shuffled.length < 3) return;
        var options = [
          { text: word, correct: true },
          { text: shuffled[0], correct: false },
          { text: shuffled[1], correct: false },
          { text: shuffled[2], correct: false }
        ];
        options.sort(function() { return Math.random() - 0.5; });
        questions.push({
          type: 'multiple-choice',
          prompt: '请选出正确的词汇填空',
          sentence: line.text,
          chinese: line.chinese,
          blankWord: word,
          wordMeaning: wordInfo.meaning,
          options: options,
          id: line.id
        });
      }
    });
    return questions;
  }

  function generatePronunciationQuestions(lines) {
    var questions = [];
    lines.forEach(function(line) {
      questions.push({
        type: 'pronunciation',
        sentence: line.text,
        chinese: line.chinese,
        id: line.id
      });
    });
    return questions;
  }

    var recBtn = document.getElementById('prRecBtn');

    // Store reference to current question for recognition handlers
    var currentPronunQ = q;

    recBtn.addEventListener('click', function() {
      if (!recog) {
        showToast('❌ 您的浏览器不支持语音识别');
        return;
      }
      if (this.classList.contains('recording')) {
        try { recog.abort(); } catch(e) {}
        this.classList.remove('recording');
        this.textContent = '🎤';
        document.getElementById('prStatus').textContent = '已取消';
        return;
      }

      // Step 1: play original audio
      document.getElementById('prStatus').textContent = '🔊 播放原声中...';
      speakText(q.sentence, null, function() {
        // Step 2: show "请跟读" and start recording
        document.getElementById('prStatus').textContent = '🎤 请跟读...';
        recBtn.classList.add('recording');
        recBtn.textContent = '⏹️';

        try {
          recog.start();

          recBtn.classList.remove('recording');
          recBtn.textContent = '🎤';
          document.getElementById('prStatus').textContent = '录音出错，请重试';
        }
      });

    if (recog) {
      recog.onresult = function(event) {
        var transcript = event.results[0][0].transcript.toLowerCase().trim();
        var original = q.sentence.toLowerCase().replace(/[^a-z\s']/g, '').trim();
        var recBtnEl = document.getElementById('prRecBtn');
        if (recBtnEl) { recBtnEl.classList.remove('recording'); recBtnEl.textContent = '🎤'; }

        var origWords = original.split(/\s+/).filter(function(w) { return w; });
        var recWords = transcript.split(/\s+/).filter(function(w) { return w; });

        var resultHtml = '<div class="pr-orig">🗣️ 原文: ' + origWords.map(function(w) {
          var found = recWords.some(function(rw) { return rw === w || rw.replace(/[^a-z']/g, '') === w; });
          return found ? '<span class="ok">' + w + '</span>' : '<span class="err">' + w + '</span>';
        }).join(' ') + '</div>';

        resultHtml += '<div class="pr-recognized">🎤 你说: ' + transcript.split(/\s+/).map(function(w) {
          var found = origWords.some(function(ow) { return ow === w || w.replace(/[^a-z']/g, '') === ow; });
          return found ? '<span class="ok">' + w + '</span>' : '<span class="err">' + w + '</span>';
        }).join(' ') + '</div>';

        var correctCount = 0;
        var errorWords = [];
        origWords.forEach(function(w) {
          var found = recWords.some(function(rw) { return rw === w || rw.replace(/[^a-z']/g, '') === w; });
          if (found) correctCount++;
          else errorWords.push(w);
        });

        var total = Math.max(origWords.length, 1);
        var score = Math.round((correctCount / total) * 100);
        quizState.correctCount += (score >= 50) ? 1 : 0;

        resultHtml += '<div class="pr-score">' + score + '% <span style="font-size:14px;color:#888;">读对了 ' + correctCount + '/' + total + ' 个词</span></div>';
        if (errorWords.length > 0) {
          resultHtml += '<div style="font-size:13px;color:#c0392b;margin-top:4px;">⚠️ 建议重读: ' + errorWords.join('、') + '</div>';
        } else if (score >= 80) {
          resultHtml += '<div style="font-size:13px;color:#2c7a5c;margin-top:4px;">🌟 发音很棒！</div>';
        }

        // 如果正确率<50%，显示再练一次按钮
        if (score < 50) {
          resultHtml += '<div style="margin-top:12px;"><button class="retry-pronun-btn" style="padding:10px 24px;border-radius:22px;border:none;background:#c0392b;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">🔁 再练一次</button></div>';
        }

        document.getElementById('prResult').style.display = 'block';
        document.getElementById('prResult').innerHTML = resultHtml;
        document.getElementById('prStatus').textContent = '✅ 识别完成';

        // Bind 再练一次 button

            document.getElementById('prResult').style.display = 'none';
            document.getElementById('prStatus').textContent = '点击🎤按钮，朗读这句';
            document.getElementById('prRecBtn').textContent = '🎤';
            document.getElementById('prRecBtn').classList.remove('recording');
          });
        }
      };

      recog.onerror = function(event) {
        var statusEl = document.getElementById('prStatus');
        if (statusEl) statusEl.textContent = '⚠️ 识别失败: ' + event.error;
        var recBtnEl = document.getElementById('prRecBtn');
        if (recBtnEl) { recBtnEl.classList.remove('recording'); recBtnEl.textContent = '🎤'; }

  function showRoleplayLine(line, speaker, callback) {
    var chat = document.getElementById('rpChat');

      if (line.speaker === 'barista') label = '☕ Barista';

        '"' + line.text + '"' +
        '<div class="rp-chinese">' + line.chinese + '</div>';
    }

    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;

    if (speaker === 'staff') {
      // Play the audio
      roleplayState.speaking = true;
      document.getElementById('rpSpeakBtn').disabled = true;
      document.getElementById('rpStatus').textContent = '🔊 播放中...';

        audio.playbackRate = currentSpeed;
        audio.onended = function() {
          roleplayState.speaking = false;
          if (callback) callback();
        };
        audio.play().catch(function() {
          roleplayState.speaking = false;
          if (callback) callback();
        });
      } else {
        // No audio, just wait a bit
        setTimeout(function() {
          roleplayState.speaking = false;
          if (callback) callback();
        }, 2000);
      }

      if (callback) callback();
    }

  function roleplayPlayerSpeak() {
    if (!roleplayState.active || roleplayState.speaking) return;
    if (!roleplayState.waitingForPlayer) return;

    roleplayState.waitingForPlayer = false;
    var staffLine = roleplayState.lines[roleplayState.currentIdx];

    // Find the player response line (the "you" line following this staff line)
    var allLines = sceneData[roleplayState.scene].lines;
    var playerIdx = -1;
    for (var i = 0; i < allLines.length; i++) {
      if (allLines[i].id === staffLine.id && i + 1 < allLines.length && allLines[i+1].speaker === 'you') {
        playerIdx = i + 1;
        break;
      }
    }

    if (playerIdx === -1) {
      roleplayState.currentIdx++;
      advanceRoleplay();
      return;
    }

    var playerLine = allLines[playerIdx];
    var chat = document.getElementById('rpChat');
    var bubble = document.createElement('div');
    bubble.className = 'rp-bubble player';
    bubble.innerHTML = '<div class="rp-role-label">👤 You</div>' +
      '"' + playerLine.text + '"' +
      '<div class="rp-hint">💡 ' + playerLine.chinese + '</div>';

    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
    document.getElementById('rpStatus').textContent = '✅ 轮到你！真是个好回答！';

      document.getElementById('rpStatus').textContent = '🎤 请跟读你的回答...';

    }

    // Automatically advance after a moment

      advanceRoleplay();
    }, 2000);
  }

        exitRoleplay();
      }
    });

    // RP link in detail page
    document.getElementById('detailRoleplayLink').addEventListener('click', function() {
      startRoleplay(currentScene);
    });

    // Handle speech recognition for roleplay
    if (recog) {
      var origOnResult = recog.onresult;
      recog.addEventListener('result', function(event) {
        if (roleplayState.active && !roleplayState.speaking) {
          var transcript = event.results[0][0].transcript.toLowerCase().trim();
          document.getElementById('rpSpeakBtn').classList.remove('listening');
          document.getElementById('rpSpeakBtn').textContent = '🎤';
          document.getElementById('rpStatus').textContent = '✅ 你说: "' + transcript + '"';
        }
      });
      recog.addEventListener('end', function() {
        var btn = document.getElementById('rpSpeakBtn');
        if (btn && btn.classList.contains('listening')) {
          btn.classList.remove('listening');
          btn.textContent = '🎤';
        }
      });
    }
  }


  // ========== COLLECTIONS PAGE ==========
  var collectTab = 'sentences';

  document.querySelectorAll('.collect-tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.collect-tab-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      collectTab = this.getAttribute('data-collect');
      renderCollect();
    });
  });

  function renderCollect() {
    var area = document.getElementById('collectContent');
    if (collectTab === 'sentences') {
      renderSentenceCollection(area);
    } else if (collectTab === 'audio') {
      renderAudioCollection(area);
    } else if (collectTab === 'words') {
      renderWordCollection(area);
    }
  }

  // ========== COLLECTION RENDERERS ==========
  function renderSentenceCollection(area) {
    var favIds = Object.keys(favs);
    if (favIds.length === 0) {
      area.innerHTML = '<div class="collection-empty"><div class="ce-icon">💬</div><div class="ce-text">还没有收藏的句子<br>在场景详情页点击 ☆ 收藏句子</div></div>';
      return;
    }

    var html = '';
    favIds.forEach(function(id) {
      var f = favs[id];
      html += '<div class="collect-card" data-id="' + id + '">' +
        '<div class="cc-english">"' + f.text + '"</div>' +
        '<div class="cc-chinese">' + (f.chinese || '') + '</div>' +
        '<div class="cc-meta">📅 ' + (f.date ? f.date.slice(0, 10) : '') + '</div>' +
        '<div class="cc-actions">' +
        '<button class="spk-btn" data-text="' + f.text.replace(/"/g, '&quot;') + '">🔊 播放</button>' +
        '<button class="del-fav-btn" data-id="' + id + '">🗑️ 删除</button>' +
        '</div></div>';
    });
    area.innerHTML = html;

    // Bind event delegation for sentence collection
    area.querySelectorAll('.spk-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var text = this.getAttribute('data-text');
        speakText(text, null);
      });
    });
    area.querySelectorAll('.del-fav-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        delete favs[id];
        saveAll();
        renderCollect();
        updateFavButtons();
        updateProgress();
        showToast('🗑️ 已删除');
      });
    });
  }

  function renderAudioCollection(area) {
    var recIds = Object.keys(recordings);
    if (recIds.length === 0) {
      area.innerHTML = '<div class="collection-empty"><div class="ce-icon">🎤</div><div class="ce-text">还没有录音，去学习页面试试 🎤</div></div>';
      return;
    }

    var html = '';
    recIds.forEach(function(id) {
      var r = recordings[id];
      if (!r || !r.audio) return;
      var displayText = (r.text || '').substring(0, 30) + ((r.text || '').length > 30 ? '...' : '');
      var durationDisplay = r.duration ? formatDuration(r.duration) : '';
      html += '<div class="audio-recording-item" data-id="' + id + '">' +
        '<div class="audio-item-info">' +
        '<div class="ai-english">"' + displayText + '"</div>' +
        '<div class="ai-date">' +
          (durationDisplay ? ('⏱️ ' + durationDisplay + ' · ') : '') +
          '📅 ' + (r.date ? r.date.slice(0, 10) : '') +
        '</div>' +
        '</div>' +
        '<div class="audio-item-controls">' +
        '<button class="play-now" data-id="' + id + '">▶️</button>' +
        '<button class="delete-btn" data-id="' + id + '">🗑️</button>' +
        '</div></div>';
    });
    area.innerHTML = html;

    area.querySelectorAll('.play-now').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var r = recordings[id];
        if (r && r.audio) {
          var audio = new Audio(r.audio);
          audio.play();
        }
      });
    });

    area.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        delete recordings[id];
        saveAll();
        renderCollect();
        showToast('🗑️ 录音已删除');
      });
    });
  }

  function formatDuration(seconds) {
    if (!seconds || seconds <= 0) return '';
    if (seconds < 60) return Math.round(seconds) + 's';
    var min = Math.floor(seconds / 60);
    var sec = Math.round(seconds % 60);
    return min + 'm ' + sec + 's';
  }

  function renderWordCollection(area) {
    var wordKeys = Object.keys(wordFavs);
    if (wordKeys.length === 0) {
      area.innerHTML = '<div class="collection-empty"><div class="ce-icon">📖</div><div class="ce-text">还没有收藏的生词<br>在单词详解弹窗中点击收藏</div></div>';
      return;
    }

    var html = '';
    wordKeys.forEach(function(key) {
      var w = wordDB[key];
      if (!w) return;
      html += '<div class="collect-card" data-key="' + key + '">' +
        '<div class="cc-english" style="color:#d35400;">' + w.word + ' <span style="font-size:12px;color:#888;font-weight:400;">' + (w.phonetic || '') + '</span></div>' +
        '<div class="cc-chinese">' + (w.meaning || '') + '</div>' +
        '<div class="cc-actions">' +
        '<button class="word-spk-btn" data-word="' + w.word.replace(/"/g, '&quot;') + '">🔊 发音</button>' +
        '<button class="del-word-btn" data-key="' + key + '">🗑️ 删除</button>' +
        '</div></div>';
    });
    area.innerHTML = html;

    area.querySelectorAll('.word-spk-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var word = this.getAttribute('data-word');
        speakText(word, null);
      });
    });
    area.querySelectorAll('.del-word-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var key = this.getAttribute('data-key');
        delete wordFavs[key];
        saveAll();
        renderCollect();
        showToast('🗑️ 已删除');
      });
    });
  }

  // ========== PROFILE PAGE ==========
  function renderProfile() {
    var totalSentences = allDialogLines.length;
    document.getElementById('statSentences').textContent = totalSentences;
    document.getElementById('statFavs').textContent = stats.favCount || Object.keys(favs).length;
    document.getElementById('statRecordings').textContent = Object.keys(recordings).length;

    var qPct = 0;
    if (stats.quizTotal > 0) {
      qPct = Math.round((stats.quizCorrect / stats.quizTotal) * 100);
    }
    document.getElementById('statQuizPct').textContent = qPct + '%';

    var lr = document.getElementById('lastReviewDate');
    if (reviewData.lastReview) {
      lr.value = reviewData.lastReview;
    } else {
      lr.value = '还未复习';
    }

    document.getElementById('reviewFreq').value = String(reviewData.freq || 0);
  }

  document.getElementById('doReviewBtn').addEventListener('click', function() {
    var now = new Date();
    var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    reviewData.lastReview = dateStr;
    saveAll();
    renderProfile();
    showToast('✅ 已标记为已复习');
  });

  document.getElementById('reviewFreq').addEventListener('change', function() {
    reviewData.freq = parseInt(this.value);
    saveAll();
    showToast('✅ 已保存设置');
  });

  document.getElementById('resetStatsBtn').addEventListener('click', function() {
    if (confirm('确定要重置所有学习数据吗？\n（收藏、录音、学习统计将全部清空）')) {
      localStorage.removeItem('eng_favs');
      localStorage.removeItem('eng_recordings');
      localStorage.removeItem('eng_wordFavs');
      localStorage.removeItem('eng_stats');
      favs = {};
      recordings = {};
      wordFavs = {};
      stats = { sentencesSeen: 0, quizCorrect: 0, quizTotal: 0, favCount: 0 };
      saveAll();
      updateFavButtons();
      updateProgress();
      renderProfile();
      showToast('✅ 已重置所有数据');
    }
  });

  // ========== REVIEW REMINDER ==========
  function checkReviewReminder() {
    var freq = reviewData.freq || 0;
    if (freq === 0) return;

    var now = new Date();
    var hour = now.getHours();
    var shouldRemind = false;

    if (freq === 1 && hour === 20) shouldRemind = true;
    if (freq === 2 && (hour === 10 || hour === 20)) shouldRemind = true;
    if (freq === 3 && (hour === 10 || hour === 15 || hour === 20)) shouldRemind = true;

    if (shouldRemind && reviewData.lastReview) {
      var lastDate = reviewData.lastReview.slice(0, 10);
      var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      if (lastDate === today) return;
    }

    if (shouldRemind) {
      var favCount = Object.keys(favs).length;
      var recCount = Object.keys(recordings).length;
      var total = favCount + recCount;
      if (total > 0) {
        showToast('⏰ 复习提醒！你有 ' + favCount + ' 个收藏和 ' + recCount + ' 条录音可以复习');
      }
    }
  }

  // ========== INIT ==========
  updateFavButtons();
  updateProgress();
  renderProfile();
  initDarkMode();
  initSpeedControl();
  initDailyQuote();
  initRoleplay();

  // Check review reminder
  checkReviewReminder();
  setInterval(checkReviewReminder, 30 * 60 * 1000);

  // Expose speakText globally for inline onclick handlers in collections
  window.speakText = speakText;

  // Prime AudioContext on any first user click (Chrome autoplay policy workaround)
  var audioCtxPrimed = false;
  function primeAudio() {
    if (audioCtxPrimed) return;
    audioCtxPrimed = true;
    try {
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
  }
  document.addEventListener('click', primeAudio, { once: true });
  document.addEventListener('touchstart', primeAudio, { once: true });

  

  console.log('✅ 英语口语练习页面加载完成');
  console.log('📊 已加载 ' + allDialogLines.length + ' 条对话');

  // Lazy-fix: re-render detail if already on a scene
  // (no-op at init since detail is hidden)

})();
</script>

</body>
</html>
