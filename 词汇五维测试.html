<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>五维词汇测试</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f4f8;min-height:100vh;color:#2c3e50;padding:0 12px 40px}
.wrap{max-width:680px;margin:0 auto}
.page{display:none}.page.act{display:block}

/* ── 首页 ── */
.home{text-align:center;padding-top:40px}
.home h1{font-size:28px;font-weight:700;margin-bottom:6px}
.home h1 em{color:#2e86ab;font-style:normal}
.home p{color:#6c757d;font-size:14px;line-height:1.8;margin-bottom:20px}
.lvs{display:grid;gap:10px}
.lv{background:#fff;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:2px solid transparent;transition:.15s;text-align:left}
.lv.sel{border-color:#2e86ab;background:#f0f7fb}
.lv .a{font-weight:600;font-size:15px}
.lv .b{font-size:12px;color:#6c757d}
.lv .c{font-size:12px;padding:3px 12px;border-radius:10px}

/* ── 通用 ── */
.btn{display:block;width:100%;padding:14px 0;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;text-align:center;transition:.2s}
.btn.prim{background:#2e86ab;color:#fff}
.btn.ok{background:#38a169;color:#fff}
.btn.out{background:#fff;border:2px solid #dee2e6;color:#495057}

.card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px;text-align:center}

/* ── 进度 ── */
.prow{display:flex;gap:4px;justify-content:center;margin-bottom:12px}
.pd{width:28px;height:4px;border-radius:2px;background:#dee2e6;transition:.3s}
.pd.cur{background:#2e86ab}.pd.go{background:#38a169}.pd.no{background:#dc3545}

/* ── 步骤 ── */
.srow{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.sd{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;background:#e9ecef;color:#6c757d}
.sd.act{background:#2e86ab;color:#fff}.sd.ok{background:#38a169;color:#fff}

/* ── 选项 ── */
.opts{display:flex;flex-direction:column;gap:8px}
.opts .i{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #e9ecef;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
.opts .i.sel{border-color:#2e86ab;background:#f0f7fb;font-weight:500}
.opts .i.cor{border-color:#38a169;background:#e8f5e9}
.opts .i.wro{border-color:#dc3545;background:#fce4e4}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pg .i{display:flex;align-items:center;justify-content:center;padding:14px;font-family:'Courier New',monospace;font-size:17px;border:2px solid #e9ecef;border-radius:10px;cursor:pointer;transition:.15s}
.pg .i.sel{border-color:#2e86ab;background:#f0f7fb;font-weight:600}
.pg .i.cor{border-color:#38a169;background:#e8f5e9}
.pg .i.wro{border-color:#dc3545;background:#fce4e4}
.pi{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #e9ecef;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s;margin-bottom:8px}
.pi.sel{border-color:#2e86ab;background:#f0f7fb;font-weight:500}
.pi.cor{border-color:#38a169;background:#e8f5e9}
.pi.wro{border-color:#dc3545;background:#fce4e4}
textarea{width:100%;height:90px;border:2px solid #e9ecef;border-radius:12px;padding:12px;font-size:15px;outline:none;font-family:inherit}
textarea:focus{border-color:#2e86ab}

/* ── 报告 ── */
.big{font-size:44px;font-weight:800;color:#2e86ab}
.big em{font-size:16px;font-weight:400;color:#6c757d;font-style:normal}
.db{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.db .a{width:52px;font-size:13px;text-align:right}
.db .b{flex:1;height:12px;background:#e9ecef;border-radius:6px;overflow:hidden}
.db .c{height:100%;border-radius:6px;transition:width .8s}
.db .d{width:44px;font-size:13px;font-weight:500;text-align:right}
.dg{background:#f8f9fa;border-radius:12px;padding:16px;text-align:left;font-size:14px}
.dg .r{display:flex;gap:8px;margin-bottom:6px}
.dg .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.wl{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eef2f7;font-size:14px}
.wl:last-child{border:none}
.btns{display:flex;gap:10px;margin-top:14px}
.btns .btn{flex:1;padding:12px 0;font-size:14px}
canvas{max-width:260px;margin:0 auto}
@media(max-width:500px){.pg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<!-- ─── 首页 ─── -->
<div class="page act" id="p0">
<div class="home">
<h1>📖 五维<em>词汇深度测试</em></h1>
<p>词汇量 · 读音 · 词性 · 搭配 · 辨句 · 造句<br>从5个维度测出你到底会不会用这个词</p>
<div class="lvs">
<div class="lv" data-v="1" onclick="pick(this)"><div><div class="a">🌱 入门级</div><div class="b">0-800词</div></div><span class="c" style="background:#e8f5e9;color:#38a169">小学</span></div>
<div class="lv" data-v="2" onclick="pick(this)"><div><div class="a">🌿 基础级</div><div class="b">800-1600词</div></div><span class="c" style="background:#d0eaf0;color:#2e86ab">初一~初二</span></div>
<div class="lv sel" data-v="3" onclick="pick(this)"><div><div class="a">🌳 进阶级</div><div class="b">1600-2500词</div></div><span class="c" style="background:#fce4c8;color:#e8a83d">初三~高一</span></div>
<div class="lv" data-v="4" onclick="pick(this)"><div><div class="a">🌲 高考级</div><div class="b">2500-3500词</div></div><span class="c" style="background:#f8d7da;color:#dc3545">高二~高三</span></div>
<div class="lv" data-v="5" onclick="pick(this)"><div><div class="a">🏔️ 拔高级</div><div class="b">3500-5000+</div></div><span class="c" style="background:#e8daf5;color:#7b3fa0">四级/拔尖</span></div>
</div>
<button class="btn prim" onclick="go()" style="margin-top:16px">开始测试 🔥</button>
<p style="font-size:12px;color:#999;margin-top:10px">自适应抽题 · 约15~20分钟</p>
</div>
</div>

<!-- ─── 第一层 ─── -->
<div class="page" id="p1">
<div class="prow" id="pdot"></div>
<div style="text-align:center;font-size:13px;color:#6c757d;margin-bottom:8px" id="lvtip">🌳 进阶级</div>
<div class="card">
<div id="s1w" style="font-size:32px;font-weight:700;color:#1a1a2e">—</div>
<div style="font-size:14px;color:#999;margin-top:4px"><span id="s1p">—</span><span style="cursor:pointer;margin-left:8px;font-size:22px" onclick="spk1()">🔊</span></div>
<div style="font-size:14px;color:#999;margin:16px 0">这个词你认识吗？</div>
<div style="display:flex;gap:12px">
<button class="btn out" onclick="nope()" style="flex:1">✗ 不认识</button>
<button class="btn ok" onclick="yep()" style="flex:1">✓ 认识</button>
</div>
</div>
</div>

<!-- ─── 第二层 ─── -->
<div class="page" id="p2">
<div style="text-align:center;font-size:13px;color:#6c757d;margin-bottom:4px" id="dptip">深度诊断 1/10</div>
<div class="srow" id="sdot"></div>
<div style="text-align:center;font-size:13px;color:#6c757d;margin-bottom:10px" id="stitle">第 1 步：选出正确读音</div>
<div class="card">
<div id="s2w" style="font-size:32px;font-weight:700;color:#1a1a2e">—</div>
<div style="font-size:14px;color:#999;margin-top:4px;margin-bottom:10px"><span id="s2p">—</span><span style="cursor:pointer;margin-left:8px;font-size:22px" onclick="spk2()">🔊</span></div>
<div id="sq"></div>
<button class="btn prim" id="nxtbtn" style="margin-top:14px" onclick="ck()" disabled>确认答案</button>
</div>
</div>

<!-- ─── 报告 ─── -->
<div class="page" id="p3">
<div id="rpt">
<div class="card">
<div style="font-size:20px;font-weight:700;margin-bottom:4px">📊 词汇诊断报告</div>
<div style="font-size:14px;color:#6c757d;margin-bottom:12px" id="rlv">—</div>
<div class="big" id="rnum">0 <em>词</em></div>
</div>
<div class="card"><canvas id="cv" width="260" height="260"></canvas></div>
<div class="card" id="rbars"></div>
<div class="card"><div class="dg" id="rdiag"></div></div>
<div class="card" id="rwrong"></div>
<div class="btns"><button class="btn out" onclick="location.reload()">🔄 重新测试</button><button class="btn prim" id="expbtn" onclick="exp()">📸 保存报告图</button></div>
</div>
</div>

</div>

function pick(el){document.querySelectorAll('.lv').forEach(p=>p.classList.remove('sel'));el.classList.add('sel');L=parseInt(el.dataset.v)}

// ══════ 音标朗读 ══════
function spk1(){const w=document.getElementById('s1w').textContent;if(w&&w!='—'){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u)}}
function spk2(){const w=document.getElementById('s2w').textContent;if(w&&w!='—'){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u)}}

// ══════ 第一层 ══════
var CL=L,SW=[],SI=0,SR=[],KW=[],EV=0;

function go(){CL=L;SW=[];SR=[];SI=0;adW(CL,5);pg('p1');pdots();ltip();s1()}
function adW(lv,n){if(!W[lv])return;const p=sf([...W[lv]]);for(let i=0;i<Math.min(n,p.length);i++)SW.push({...p[i],l:lv})}
function pdots(){const c=document.getElementById('pdot');c.innerHTML='';for(let i=0;i<SW.length;i++){const d=document.createElement('div');d.className='pd';if(i<SR.length)d.classList.add(SR[i].k?'go':'no');else if(i===SR.length)d.classList.add('cur');c.appendChild(d)}}
function ltip(){document.getElementById('lvtip').innerHTML=LN[CL]}
function s1(){if(SI>=SW.length){fs();return}const w=SW[SI];document.getElementById('s1w').textContent=w.w;document.getElementById('s1p').textContent=w.p}
function yep(){SR.push({w:SW[SI],k:true,l:SW[SI].l});SI++;ca();pdots();s1()}
function nope(){SR.push({w:SW[SI],k:false,l:SW[SI].l});SI++;ca();pdots();s1()}

const mX={1:1,2:2,3:4,4:5,5:5},mN={1:1,2:1,3:2,4:3,5:3};
function ca(){if(SI%5===0&&SI>0){const r=SR.slice(-5);const k=r.filter(x=>x.k).length;const mx=mX[L]||5,mi=mN[L]||1;if(k>=4&&CL<mx){CL++;adW(CL,3);ltip();pdots()}else if(k<=1&&CL>mi){CL--;adW(CL,3);ltip();pdots()}}}

function fs(){
  KW=SR.filter(r=>r.k).map(r=>r.w);
  const mx=LV[L];
  let cl=1;for(let l=1;l<=5;l++){const t=SR.filter(r=>r.l===l);if(t.length>0&&t.filter(x=>x.k).length/t.length>=.5)cl=l}
  cl=Math.min(cl,L+1);let tv=LV[cl];
  for(let l=cl+1;l<=5;l++){const t=SR.filter(r=>r.l===l);if(t.length>0){tv+=Math.round((LV[l]-LV[l-1])*t.filter(x=>x.k).length/t.length*.5)}}
  EV=Math.min(tv,Math.round(mx*1.3));
  if(KW.length===0){alert('不太认识这些词，试试选更低级别？');pg('p0');return}
  const p=sf([...KW]);DW=p.slice(0,10);DI=0;DS=0;DR=[];pg('p2');sdot();s2()
}

// ══════ 第二层 ══════
var DW=[],DI=0,DS=0,DR=[],AS=null;
const ST=['第1步：选出正确读音','第2步：选出所有正确词性','第3步：选出正确搭配','第4步：选出正确句子','第5步：用这个词造个句子'];

function sdot(){const c=document.getElementById('sdot');c.innerHTML='';const ic=['🔊','🏷️','🔧','✍️','🖊️'];for(let i=0;i<5;i++){const d=document.createElement('div');d.className='sd';d.textContent=ic[i];if(i<DS)d.classList.add('ok');else if(i===DS)d.classList.add('act');c.appendChild(d)}document.getElementById('dptip').textContent='深度诊断 '+(DI+1)+'/'+DW.length}
function s2(){if(DI>=DW.length){fd();return}
const w=DW[DI];document.getElementById('s2w').textContent=w.w;document.getElementById('stitle').textContent=ST[DS];sdot()
if(DS===0){document.getElementById('s2p').textContent='?(不显示音标)';rPh(w)}
else{document.getElementById('s2p').textContent=w.p;if(DS===1)rPo(w);else if(DS===2)rCo(w);else if(DS===3)rSe(w);else rWr(w)}
document.getElementById('nxtbtn').textContent='确认答案';document.getElementById('nxtbtn').disabled=true;AS=null}

function rPh(w){const c=document.getElementById('sq');let a=sf([...w.pt]);let h='<div class="pg">';a.forEach(p=>{h+=`<div class="i" onclick="selPh(this)" data-x="${p}">${p}</div>`});h+='</div>';c.innerHTML=h}
function selPh(el){document.querySelectorAll('#sq .pg .i').forEach(l=>l.classList.remove('sel'));el.classList.add('sel');AS=el.dataset.x;document.getElementById('nxtbtn').disabled=false}

function rPo(w){const c=document.getElementById('sq');let a=sf([...w.po,...w.pr]);let h='<div id="po">';a.forEach(p=>{h+=`<div class="pi" onclick="tog(this)" data-x="${p}">${p}</div>`});h+='</div><div style="font-size:12px;color:#999;margin-top:6px">可多选，选出所有正确词性</div>';c.innerHTML=h;document.getElementById('nxtbtn').disabled=false}
function tog(el){el.classList.toggle('sel')}

function rCo(w){const c=document.getElementById('sq');let a=sf([w.co.r,...w.co.w]);let h='<div class="opts">';a.forEach(p=>{h+=`<div class="i" onclick="selOp(this)" data-x="${p}">${p}</div>`});h+='</div>';c.innerHTML=h}
function rSe(w){const c=document.getElementById('sq');let a=sf([w.se.r,...w.se.w]);let h='<div class="opts">';a.forEach(p=>{h+=`<div class="i" onclick="selOp(this)" data-x="${p}">${p}</div>`});h+='</div>';c.innerHTML=h}
function selOp(el){document.querySelectorAll('#sq .opts .i').forEach(l=>l.classList.remove('sel'));el.classList.add('sel');AS=el.dataset.x;document.getElementById('nxtbtn').disabled=false}

function rWr(w){const c=document.getElementById('sq');c.innerHTML=`<textarea id="wi" placeholder="用「${w.w}」写一个英文句子..."></textarea><div style="font-size:13px;color:#6c757d;margin-top:6px">${w.hi||''}</div>`;document.getElementById('wi').oninput=function(){document.getElementById('nxtbtn').disabled=this.value.trim().length<3}}

// ══════ 确认答案 ══════
function ck(){const w=DW[DI];let ok=false
if(!DR[DI])DR[DI]={w:w,st:[]}
if(DS===0){ok=AS===w.p||(w.pt.includes(AS)&&AS===w.p);const cp=[w.p];document.querySelectorAll('#sq .pg .i').forEach(l=>{if(l.dataset.x===w.p)l.classList.add('cor');else if(l.dataset.x===AS)l.classList.add('wro')})}
else if(DS===1){const s=[...document.querySelectorAll('#po .pi.sel')].map(l=>l.dataset.x);const cp=[...w.po];ok=s.length===cp.length&&s.every(p=>cp.includes(p));const sv=[...s];document.querySelectorAll('#po .pi').forEach(l=>{if(cp.includes(l.dataset.x))l.classList.add('cor');else if(sv.includes(l.dataset.x))l.classList.add('wro')})}
else if(DS===2){ok=AS===w.co.r;document.querySelectorAll('#sq .opts .i').forEach(l=>{if(l.dataset.x===w.co.r)l.classList.add('cor');else if(l.dataset.x===AS)l.classList.add('wro')})}
else if(DS===3){ok=AS===w.se.r;document.querySelectorAll('#sq .opts .i').forEach(l=>{if(l.dataset.x===w.se.r)l.classList.add('cor');else if(l.dataset.x===AS)l.classList.add('wro')})}
else if(DS===4){const t=document.getElementById('wi').value.trim();const cw=t.toLowerCase().includes(w.w.toLowerCase());const hv=/\b(am|is|are|was|were|have|has|had|do|does|did|will|can|must|shall|may|be|been|being|[a-z]+ed|[a-z]+ing|[a-z]+s)\b/i.test(t)||t.split(' ').length>=3;const le=t.length>=6&&t.split(' ').length>=3;ok=cw&&(hv||le)
let fb=document.createElement('div');fb.style.cssText='margin-top:10px;padding:12px;border-radius:10px;font-size:14px;text-align:center;';
if(ok){fb.style.background='#e8f5e9';fb.style.color='#38a169';fb.innerHTML='句子合格！会用这个词！'}
else{fb.style.background='#fff3cd';fb.style.color='#856404';
if(!cw)fb.innerHTML='句子中没有包含「'+w.w+'」这个词';
else if(!le)fb.innerHTML='句子太短了，试着写一个完整句子';
else fb.innerHTML='句子结构需要完善，注意主谓宾'}
document.getElementById('sq').appendChild(fb)}
DR[DI].st[DS]=ok;document.getElementById('nxtbtn').textContent='下一步';document.getElementById('nxtbtn').onclick=nx}

function nx(){DS++;if(DS>=5){DS=0;DI++}document.getElementById('nxtbtn').textContent='确认答案';document.getElementById('nxtbtn').onclick=ck;s2()}

// ══════ 完成 ══════
function fd(){const sc=[0,0,0,0,0],tt=[0,0,0,0,0];DR.forEach(r=>{r.st.forEach((s,i)=>{if(s!==undefined){tt[i]++;if(s)sc[i]++}})});pg('p3');rpt(sc,tt)}

// ══════ 报告 ══════
function rpt(sc,tt){
document.getElementById('rnum').innerHTML=EV+' <em>词</em>';
let lt='🌱 入门级';if(EV>800)lt='🌿 基础级';if(EV>1600)lt='🌳 进阶级';if(EV>2500)lt='🌲 高考级';if(EV>3500)lt='🏔️ 拔高级';
document.getElementById('rlv').textContent='约 '+lt;

// 雷达图
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W2=260,CX=130,CY=130,R=90;ctx.clearRect(0,0,W2,W2)
const pct=sc.map((s,i)=>tt[i]>0?s/tt[i]:0)
ctx.strokeStyle='#e9ecef';ctx.lineWidth=1;
for(let ri=1;ri<=4;ri++){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2-i*Math.PI*2/5;const x=CX+ri*R/4*Math.cos(a),y=CY-ri*R/4*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.stroke()}
for(let i=0;i<5;i++){const a=Math.PI/2-i*Math.PI*2/5;ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+R*Math.cos(a),CY-R*Math.sin(a));ctx.stroke()
const lx=CX+(R+20)*Math.cos(a),ly=CY-(R+20)*Math.sin(a);ctx.fillStyle='#495057';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(DL[i],lx,ly)}
ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2-i*Math.PI*2/5;const l=pct[i]*R;const x=CX+l*Math.cos(a),y=CY-l*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.fillStyle='rgba(46,134,171,0.2)';ctx.fill();ctx.strokeStyle='#2e86ab';ctx.lineWidth=2;ctx.stroke();
for(let i=0;i<5;i++){const a=Math.PI/2-i*Math.PI*2/5;const l=pct[i]*R;ctx.beginPath();ctx.arc(CX+l*Math.cos(a),CY-l*Math.sin(a),4,0,Math.PI*2);ctx.fillStyle='#2e86ab';ctx.fill()}

// 维度条
let bh='';sc.forEach((s,i)=>{const p=tt[i]>0?Math.round(s/tt[i]*100):0;bh+=`<div class="db"><span class="a">${DL[i]}</span><div class="b"><div class="c" style="width:${p}%;background:${DC[i]}"></div></div><span class="d">${s}/${tt[i]}</span></div>`});document.getElementById('rbars').innerHTML=bh

// 诊断
let wk=0,wp=100;sc.forEach((s,i)=>{const p=tt[i]>0?s/tt[i]:1;if(p<wp){wp=p;wk=i}})
const ad=['建议多练音标，注意重音位置。','背单词时标好词性，不要只记意思。','多记词组搭配，用搭配词典学习。','多做句子分析练习，找主谓宾。','每学一个词，用它造3个句子。'];
let dh='<b style="font-size:15px">诊断结论</b><br><br>';
dh+=`<div class="r"><span class="dot" style="background:${DC[wk]}"></span><div><b>最弱维度：${DL[wk]}</b><br>${ad[wk]}</div></div>`;
if(EV<2500)dh+=`<div class="r" style="margin-top:8px"><span class="dot" style="background:#e8a83d"></span><div><b>词汇量还需提升</b><br>建议每天背20个新词，从当前级别向上突破。</div></div>`;
else dh+=`<div class="r" style="margin-top:8px"><span class="dot" style="background:#38a169"></span><div><b>词汇量不错！</b><br>继续保持，重点加强弱项。</div></div>`;
document.getElementById('rdiag').innerHTML=dh

// 错词
const wi=DR.filter(r=>r.st.includes(false));
if(wi.length===0)document.getElementById('rwrong').innerHTML='<b style="font-size:15px">错词清单</b><br><p style="color:#6c757d;font-size:14px;margin-top:6px">暂无错词，表现不错！</p>';
else{let wh='<b style="font-size:15px">错词清单</b><br>';wi.forEach(r=>{const wd=r.st.map((s,i)=>s===false?DL[i]:null).filter(Boolean);wh+=`<div class="wl"><span>${r.w.w}</span><span style="color:#dc3545;font-size:12px">${wd.join('、')}</span></div>`});document.getElementById('rwrong').innerHTML=wh}
}

// ══════ 导出 ══════
async function exp(){const b=document.getElementById('expbtn');b.style.display='none';try{const cv=await html2canvas(document.getElementById('rpt'),{backgroundColor:'#f0f4f8',scale:2,useCORS:true});cv.toBlob(function(bl){const u=URL.createObjectURL(bl);const a=document.createElement('a');a.href=u;a.download='词汇诊断报告.png';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);b.style.display='block'},1000)},'image/png')}catch(e){b.style.display='block';alert('截图生成失败，请长按报告区域截图保存')}}
</script>
</body>
</html>
