function esc(s){return String(s).replace(/'/g,"\\'")}
function buildLessons(){
  var box=document.getElementById('generatedLessons'),html='';
  for(var n=5;n<=12;n++){
    var d=LESSONS[n];if(!d)continue;
    html+='<div class="pg" id="pageLesson'+n+'">';
    html+='<div class="top"><span class="back" onclick="goHome()">← 返回</span><h2>'+d.title+'</h2><button class="quiz-btn" onclick="toggleQuiz('+n+')">测验模式</button></div>';
    // 视频在openLesson时动态注入
    html+='<div class="content" id="content'+n+'">';
    html+='<div class="sec">📝 台词</div>';
    d.lines.forEach(function(l,i){
      html+='<div class="line"><p class="kr">'+(i+1)+'. '+l[0]+'</p><button class="speak" onclick="handleSpeak(event,'+esc(l[0])+'\')">🔊</button></div><p class="cn">→ '+l[1]+'</p>';
    });
    html+='<div class="sec">📌 单词</div><p class="vocab">'+d.vocab.map(function(v){return v[0]+' → '+v[1]}).join(' ｜ ')+'</p>';

/* ---------- 页面导航 ---------- */
function openLesson(n){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('show')});
  var pg=document.getElementById('pageLesson'+n);
  pg.classList.add('show');
  // 动态注入视频（首次打开时才创建）
  if(!pg.querySelector('video')){
    var d=LESSONS[n];
    if(d&&d.video){
      var wrap=document.createElement('div');
      wrap.className='video-wrap';
      var v=document.createElement('video');
      v.controls=true;
      v.preload='metadata';
      v.src=d.video;
      // 添加字幕轨道
      if(d.subtitle){
        var tr=document.createElement('track');
        tr.kind='subtitles';
        tr.label='韩文';
        tr.srclang='ko';
        tr.src=d.subtitle;
        tr.default=true;
        v.appendChild(tr);
      }
      wrap.appendChild(v);

      var top=pg.querySelector('.top');
      top.parentNode.insertBefore(wrap,top.nextSibling);
      // 确保字幕轨道默认显示
      var tryShowSubs=function(){
        if(v.textTracks&&v.textTracks.length&&v.textTracks[0].mode!=='showing'){
          v.textTracks[0].mode='showing';
        }
      };
      tryShowSubs();
      // track加载完成后可能重置mode，再次设置
      v.addEventListener('loadedmetadata',tryShowSubs);
      v.addEventListener('loadeddata',tryShowSubs);
    }
  }else{
    // 已有视频，确保字幕默认显示
    var v=pg.querySelector('video');
    if(v&&v.textTracks&&v.textTracks.length&&v.textTracks[0].mode!=='showing'){
      v.textTracks[0].mode='showing';
    }
  }
  setupSyncActiveLine(n);
  window.scrollTo(0,0);
}

function speak(text, btnEl){

    a.load();
    a.play().catch(function(e){console.warn('音频播放失败:',e);if(btnEl){btnEl.textContent='🔇';setTimeout(function(){if(btnEl)btnEl.textContent='🔊'},2000)}});

function refreshProgress(){
  var d=getDone(),doneCount=d.length;
  document.getElementById('statDone').textContent=doneCount;
  document.getElementById('statTodo').textContent=TOTAL_LESSONS-doneCount;
  document.getElementById('progBar').style.width=(doneCount/TOTAL_LESSONS*100).toFixed(1)+'%';
  UNLOCKED.forEach(function(n){
    var row=document.querySelector('.lesson[data-lesson="'+n+'"]');if(!row)return;
    var done=d.indexOf(n)>=0,tag=row.querySelector('.tag'),num=row.querySelector('.num');

/* ---------- 单词随机抽查 ---------- */
var quizState=null;
function buildVocabPool(){
  var done=getDone(),pool=[];
  Object.keys(LESSONS).forEach(function(k){
    if(done.indexOf(+k)<0)return;
    (LESSONS[k].vocab||[]).forEach(function(v){pool.push({kr:v[0],cn:v[1]})});
  });
  return pool;
}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function startQuiz(){
  var pool=buildVocabPool();
  if(pool.length<4){alert('已学课程的单词太少啦，先去学几课或标记完成吧～');return}
  quizState={pool:pool,order:shuffle(pool.slice()).slice(0,Math.min(10,pool.length)),idx:0,score:0};
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('show')});
  document.getElementById('pageQuiz').classList.add('show');window.scrollTo(0,0);
  renderQuiz();
}
function renderQuiz(){
  var q=quizState,body=document.getElementById('quizBody');
  if(q.idx>=q.order.length){
    var pct=Math.round(q.score/q.order.length*100);
    body.innerHTML='<div class="quiz-done"><div class="big">'+(pct>=80?'🎉':pct>=60?'👍':'💪')+'</div>'
      +'答对 '+q.score+' / '+q.order.length+' 题（'+pct+'%）'
      +'<br><br><button class="quiz-next" onclick="startQuiz()">再来一组</button>'
      +'<br><br><button class="quiz-opt" style="max-width:200px;margin:0 auto" onclick="goHome()">返回首页</button></div>';
    return;
  }
  var cur=q.order[q.idx];
  var opts=[cur];
  var others=shuffle(q.pool.filter(function(x){return x.cn!==cur.cn}));
  for(var i=0;i<others.length&&opts.length<4;i++){if(!opts.some(function(o){return o.cn===others[i].cn}))opts.push(others[i])}
  opts=shuffle(opts);
  var h='<div class="quiz-score">得分 '+q.score+'</div>';
  h+='<div class="quiz-progress">第 '+(q.idx+1)+' / '+q.order.length+' 题</div>';
  h+='<div class="quiz-question"><span>'+cur.kr+'</span><button class="speak" onclick="handleSpeak(event,'+esc(cur.kr)+'\')">🔊</button></div>';
  h+='<div class="quiz-options">';
  opts.forEach(function(o){h+='<button class="quiz-opt" onclick="answerQuiz(this,\''+esc(o.cn)+'\',\''+esc(cur.cn)+'\')">'+o.cn+'</button>'});
  h+='</div>';
  body.innerHTML=h;
}
function answerQuiz(btn,chosen,correct){
  var btns=document.querySelectorAll('.quiz-opt');
  btns.forEach(function(b){b.onclick=null});
  if(chosen===correct){btn.classList.add('correct');quizState.score++}
  else{btn.classList.add('wrong');btns.forEach(function(b){if(b.textContent===correct)b.classList.add('correct')})}
  setTimeout(function(){quizState.idx++;renderQuiz()},900);
}

/* ---------- 口语练习（简化版） ---------- */
var PRACTICE_STATE=null,PRACTICE_LESSON=null,isRecording=false,recognition=null;

function getLessonPracticeData(n){
  var d=LESSONS[n];
  if(!d)return{lines:[],vocab:[],phrases:[],patterns:[],wordSentences:{}};
  var lines=d.lines||[];
  var vocab=d.vocab||[];
  var phrases=d.phrases||[];
  var patterns=d.patterns||[];
  var wordSentences=d.wordSentences||{};
  if(n<=2){
    var el=document.getElementById('content'+n);
    if(el){
      var krEls=el.querySelectorAll('.line .kr');
      if(krEls.length>0){
        lines=[];
        krEls.forEach(function(el2){var t=el2.textContent.trim().replace(/^\d+\.\s*/,'');lines.push([t,''])})
        var cnEls=el.querySelectorAll('.cn');
        cnEls.forEach(function(el2,i){if(lines[i])lines[i][1]=el2.textContent.replace(/^→\s*/,'')});
      }
    }
  }
  // Auto-extract phrases from lines for lessons without explicit phrases
  if(phrases.length===0&&lines.length>0){
    lines.forEach(function(l){var segs=l[0].split(/[,.!?;:·…\s]+/).filter(function(s){return s.length>1&&s.length<12});if(segs.length)phrases.push([segs[Math.floor(Math.random()*segs.length)],''])});
  }
  // Auto-generate wordSentences from lines if missing
  if(Object.keys(wordSentences).length===0&&lines.length>0){
    vocab.forEach(function(v){for(var i=0;i<lines.length;i++){if(lines[i][0].indexOf(v[0])>=0){wordSentences[v[0]]=lines[i][0];break}}})
  }
  return{lines:lines,vocab:vocab,phrases:phrases,patterns:patterns,wordSentences:wordSentences};
}

}
function closePracticeModal(){

  document.body.style.overflow='';
  PRACTICE_STATE=null;
  PRACTICE_LESSON=null;
  if(recognition){try{recognition.abort()}catch(e){}}recognition=null;isRecording=false;
}

function startPractice(n){
  var d=LESSONS[n];
  if(!d)return;
  PRACTICE_STATE=null;
  PRACTICE_LESSON=n;
  document.getElementById('practiceModalTitle').textContent='🎤 口语练习 · '+d.title;
  openPracticeModal();
  document.getElementById('practiceModalBody').innerHTML='<div style="text-align:center;padding:10px 0 16px 0;font-size:13px;color:#888">选择练习模式，每轮5题</div><div class="practice-mode-selector"><button class="practice-mode-btn" onclick="enterPracticeMode('+n+',\'dialogue\')"><span class="mode-icon">🎯</span>对话练习<br><span style="font-weight:400;font-size:12px;color:#999">看中文说韩语句子</span></button><button class="practice-mode-btn" onclick="enterPracticeMode('+n+',\'word\')"><span class="mode-icon">📝</span>单词抽测<br><span style="font-weight:400;font-size:12px;color:#999">翻译单词（中韩交替）</span></button></div><div class="practice-mode-selector" style="margin-top:8px"><button class="practice-mode-btn" onclick="enterPracticeMode('+n+',\'sentence-word\')"><span class="mode-icon">✏️</span>单词造句子<br><span style="font-weight:400;font-size:12px;color:#999">用给定单词造韩语句</span></button><button class="practice-mode-btn" onclick="enterPracticeMode('+n+',\'sentence-phrase\')"><span class="mode-icon">✏️</span>短语造句子<br><span style="font-weight:400;font-size:12px;color:#999">用短语造完整句子</span></button><button class="practice-mode-btn" onclick="enterPracticeMode('+n+',\'sentence-pattern\')"><span class="mode-icon">🔤</span>句型造句子<br><span style="font-weight:400;font-size:12px;color:#999">按句型框架造句</span></button></div>';
}

function enterPracticeMode(n,mode){
  var data=getLessonPracticeData(n);
  var lines=data.lines||[],vocab=data.vocab||[],phrases=data.phrases||[],patterns=data.patterns||[],wordSentences=data.wordSentences||{};
  var questions=[];
  
  // 对话练习
  if(mode==='dialogue'){
    var pool=lines.slice();
    if(pool.length===0&&vocab.length>0){
      // 没有台词时，用单词凑成简单对话
      var shuffledVocab=vocab.slice();shuffle(shuffledVocab);
      shuffledVocab=shuffledVocab.slice(0,Math.min(5,shuffledVocab.length));
      shuffledVocab.forEach(function(v){questions.push({display:v[1],expected:v[0],dir:'cn2kr',showAudio:true})});
    }else{
      shuffle(pool);pool=pool.slice(0,Math.min(5,pool.length));
      pool.forEach(function(l){questions.push({display:l[1],expected:l[0],dir:'cn2kr',showAudio:true})});
    }
  // 单词抽测
  }else if(mode==='word'){
    var pool=vocab.slice();shuffle(pool);pool=pool.slice(0,Math.min(5,pool.length));
    pool.forEach(function(v,i){questions.push({display:i%2===0?v[1]:v[0],expected:i%2===0?v[0]:v[1],dir:i%2===0?'cn2kr':'kr2cn',showAudio:true})});
  // 单词造句子
  }else if(mode==='sentence-word'){
    var pool=vocab.slice();shuffle(pool);pool=pool.slice(0,Math.min(5,pool.length));
    pool.forEach(function(v){
      var ref=wordSentences[v[0]]||(lines[0]&&lines[0][0])||v[0]+'...';
      var hints=['💡 韩语句子=主语+宾语+动词，谓语放句末','💡 注意加助词：은/는(主语) 을/를(宾语)','💡 试试先用这个词造简单句，再加细节'][Math.floor(Math.random()*3)];
      questions.push({display:v[0]+' ('+v[1]+')',expected:'',dir:'sentence',word:v[0],ref:ref,
        prompt:'请用这个词造一个韩语句子',hint:hints});
    });
  // 短语造句子
  }else if(mode==='sentence-phrase'){
    // 如果有短语数据直接用，否则从台词提取，再不行从单词造
    if(phrases.length===0&&lines.length>0){
      lines.forEach(function(l){var segs=l[0].split(/[,.!?;:·…\s]+/).filter(function(s){return s.length>2&&s.length<10});if(segs.length>1)phrases.push([segs[1],l[0]])});
    }
    if(phrases.length===0){
      // 从单词生成简单短语
      vocab.slice(0,Math.min(5,vocab.length)).forEach(function(v){phrases.push([v[0],v[0]+'...'])});
    }
    shuffle(phrases);phrases=phrases.slice(0,Math.min(5,phrases.length));
    phrases.forEach(function(p){
      var ref=p[1]||(lines[0]&&lines[0][0])||p[0];
      var hints=['💡 把短语融入句中，注意位置和助词','💡 试试用这个短语做句子的开头或结尾','💡 可以先写简单句，再加修饰'][Math.floor(Math.random()*3)];
      questions.push({display:p[0],expected:'',dir:'sentence',ref:ref,
        prompt:'请用这个短语造一个完整的韩语句子',hint:hints});
    });
  // 句型造句子
  }else if(mode==='sentence-pattern'){
    // 尝试从tip中提取句型
    var d=LESSONS[n];
    if((patterns.length===0||!patterns)&&d&&d.tip){
      var tipText=d.tip;
      // 从tip里找常用句型标记
      var tipMatch=tipText.match(/[①②③④⑤]\s*([^①②③④⑤]+)/g);
      if(tipMatch){
        tipMatch.slice(0,5).forEach(function(t){patterns.push([t.replace(/^[①②③④⑤]\s*/,'').trim().substring(0,20)+(t.length>20?'…':''),t])});
      }else{
        // 用tip里第一句话当句型
        patterns.push([(tipText.length>20?tipText.substring(0,20)+'…':tipText),tipText]);
      }
    }
    // 如果还是没有patterns，从词汇生成通用句型
    if(patterns.length===0||!patterns){
      patterns=[];
      var sentenceWords=['…입니다 (是…)','…이/가 있어요 (有…)','…을/를 좋아해요 (喜欢…)','…하고 싶어요 (想做…)','…에 가요 (去…)'];
      sentenceWords.slice(0,Math.min(5,sentenceWords.length)).forEach(function(p){patterns.push([p,'...'])});
    }
    shuffle(patterns);patterns=patterns.slice(0,Math.min(5,patterns.length));
    patterns.forEach(function(p){
      var ref=p[1]||'...';
      var hints=['💡 句型框架是骨架，替换其中的关键词即可','💡 注意句型的固定搭配不要改动','💡 先模仿示例句子，再换词练习'][Math.floor(Math.random()*3)];
      questions.push({display:p[0]+'（示例：'+p[1]+'）',expected:'',dir:'sentence',ref:p[1],patternDesc:p[0],prompt:'请按句型框架造一个韩语句子',hint:hints});
    });
  }
  if(questions.length===0){alert('此课暂无可用数据，请先学完课程内容');return}
  PRACTICE_STATE={lesson:n,mode:mode,questions:questions,idx:0,score:0,total:0};
  PRACTICE_LESSON=n;
  renderPracticeQuestion(n);
}

function normKo(t){return t.replace(/[\s.,!?;:'"()\[\]{}~\-—…·。，！？；：""''（）【】《》]/g,'').trim()}

function compareWords(uText,eText,dir){
  if(dir==='kr2cn'){
    var m=normKo(uText)===normKo(eText);
    return{accuracy:m?100:0,cmp:m?'correct':'wrong'};
  }
  var uW=uText.trim().split(/\s+/),eW=eText.trim().split(/\s+/);
  var result=[],correct=0,total=Math.max(uW.length,eW.length);
  for(var i=0;i<eW.length;i++){
    var uw=i<uW.length?uW[i]:'',ew=eW[i];
    if(normKo(uw)===''&&i>=uW.length)result.push({word:ew,status:'missing'});
    else if(normKo(uw)===normKo(ew)){result.push({word:ew,status:'correct'});correct++}
    else result.push({word:ew,status:'wrong',heard:uw||''});
  }
  return{accuracy:total>0?Math.round(correct/total*100):0,cmp:result};
}

function practiceRecord(){
  if(isRecording)return;
  var isWeChat=navigator.userAgent.indexOf('MicroMessenger')>=0;
  var SR=!isWeChat&&(window.SpeechRecognition||window.webkitSpeechRecognition);
  if(!SR){
    document.getElementById('practice-status').textContent='⚠️ 当前浏览器不支持录音评测';
    var body=document.getElementById('practiceModalBody');
    var skipBtn=document.getElementById('practice-skip-btn');
    if(!skipBtn&&body){
      var div=document.createElement('div');
      div.style.marginTop='12px';div.style.textAlign='center';
      div.innerHTML='<button id="practice-skip-btn" class="practice-next-btn" onclick="practiceSkip()" style="background:#888">跳过录音，自评掌握度</button>';
      body.appendChild(div);
    }
    return
  }
  var btn=document.getElementById('practice-rec-btn');if(!btn)return;
  var s=PRACTICE_STATE;if(!s)return;
  var q=s.questions[s.idx];if(!q)return;
  var n=PRACTICE_LESSON;
  isRecording=true;btn.classList.add('recording');btn.textContent='⏺';
  var recogLang=q.dir==='kr2cn'?'zh-CN':'ko-KR';
  document.getElementById('practice-status').textContent='🎤 正在听...';
  recognition=new SR();recognition.lang=recogLang;recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;
  recognition.onresult=function(e){practiceHandleResult(e.results[0][0].transcript.trim())};
  recognition.onerror=function(e){
    isRecording=false;if(btn){btn.classList.remove('recording');btn.textContent='🎤'}
    var msg='⚠️ ';switch(e.error){case'no-speech':msg+='没有检测到语音，请再试一次';break;case'audio-capture':msg+='麦克风未找到或未授权';break;case'not-allowed':msg+='麦克风权限被拒绝';break;default:msg+='识别出错：'+e.error}
    document.getElementById('practice-status').textContent=msg;
  };
  recognition.onend=function(){isRecording=false;if(btn){btn.classList.remove('recording');btn.textContent='🎤'}};
  try{recognition.start()}catch(e2){isRecording=false;if(btn){btn.classList.remove('recording');btn.textContent='🎤'}document.getElementById('practice-status').textContent='⚠️ 启动识别失败'}
}

function practiceHandleResult(transcript){
  var s=PRACTICE_STATE;if(!s)return;
  var q=s.questions[s.idx];if(!q)return;
  var n=PRACTICE_LESSON;
  var resultDiv=document.getElementById('practice-result');
  var cmp=compareWords(transcript,q.expected,q.dir);s.total++;
  var isCorrect=cmp.accuracy>=70;if(isCorrect)s.score++;
  var chipsHtml='';
  if(typeof cmp.cmp==='string'){
    chipsHtml='<span class="word-chip '+(cmp.cmp==='correct'?'correct':'wrong')+'">'+esc(transcript)+'</span>';
  }else{
    chipsHtml=cmp.cmp.map(function(w){return'<span class="word-chip '+w.status+'">'+(w.status==='correct'?'🟢 ':'🔴 ')+(w.status==='wrong'?w.word+'(→'+w.heard+')':w.word)+'</span>'}).join('');
  }
  resultDiv.innerHTML='<div class="practice-result"><div class="user-text">你说：'+esc(transcript)+'</div><div class="expected-text">正确：'+esc(q.expected)+'</div><div class="practice-word-analysis">'+chipsHtml+'</div><div class="accuracy-bar"><div class="accuracy-fill" style="width:'+cmp.accuracy+'%;background:'+(cmp.accuracy>=70?'#2ecc71':cmp.accuracy>=40?'#f39c12':'#e74c3c')+'"></div></div><div class="accuracy-label">正确率 '+cmp.accuracy+'% '+(isCorrect?'🟢 正确':'🔴 需改进')+'</div></div><button class="practice-next-btn" onclick="practiceNext()">下一题 →</button>';
  savePracticeScore(n,s.score,s.total);
}

function practiceNext(){
  var s=PRACTICE_STATE;if(!s)return;
  var n=PRACTICE_LESSON;
  s.idx++;renderPracticeQuestion(n);
}

function savePracticeScore(n,score,total){
  try{var key='practice_score_'+n;var d=JSON.parse(localStorage.getItem(key))||{scores:[],best:0,totalPractice:0};d.scores.push({score:score,total:total,date:new Date().toISOString()});d.best=Math.max(d.best,Math.round(score/total*100));d.totalPractice++;localStorage.setItem(key,JSON.stringify(d))}catch(e){}
}

function practiceSubmitType(){
  var input=document.getElementById('practice-type-input');

/* 句子模式正误对比判断 */
function handleSentenceResult(transcript){
  var s=PRACTICE_STATE;if(!s)return;
  var q=s.questions[s.idx];if(!q||q.dir!=='sentence')return;
  var n=PRACTICE_LESSON;
  var resultDiv=document.getElementById('practice-result');
  if(!resultDiv)return;
  var userNorm=normKo(transcript);
  var refNorm=normKo(q.ref);
  var isCorrect=(userNorm===refNorm);
  s.total++;
  if(isCorrect)s.score++;
  var resultIcon=isCorrect?'🟢':'🔴';
  var resultLabel=isCorrect?'正确 ✅':'需改进';
  var resultBg=isCorrect?'#e8f8e8':'#fde8e8';
  var resultBorder=isCorrect?'#2ecc71':'#e74c3c';
  var audioBtn='';
  if(KO_AUDIO_MAP[q.ref]){
    audioBtn='<div style="text-align:center;margin-top:12px"><button class="speak" onclick="handleSpeak(event,'+esc(q.ref)+')">🔊 听参考发音</button></div>';
  }
  resultDiv.innerHTML='<div class="practice-result" style="padding:16px;background:'+resultBg+';border-radius:10px;border:1px solid '+resultBorder+'">'
    +'<div style="text-align:center;font-size:20px;margin-bottom:8px">'+resultIcon+' '+resultLabel+'</div>'
    +'<div style="font-size:12px;color:#888;margin-bottom:4px">你的造句：</div>'
    +'<div style="font-size:15px;font-weight:500;padding:6px 10px;background:#fff;border-radius:6px;line-height:1.5;margin-bottom:10px">'+esc(transcript)+'</div>'
    +'<div style="font-size:12px;color:#888;margin-bottom:4px">参考例句'+(isCorrect?'':'（↓ 请参考）')+'：</div>'
    +'<div style="font-size:15px;font-weight:500;padding:6px 10px;background:#eef4fa;border-radius:6px;line-height:1.5;margin-bottom:8px">'+esc(q.ref)+'</div>'
    +'<div style="text-align:center;font-size:14px;font-weight:600;margin:4px 0;color:'+(isCorrect?'#27ae60':'#e74c3c')+'">得分: '+s.score+' / '+s.total+'</div>'
    +audioBtn
    +'<button class="practice-next-btn" onclick="practiceSentenceNext()" style="margin-top:12px;display:block;margin-left:auto;margin-right:auto">下一题 →</button></div>';
  document.getElementById('practice-status').textContent=isCorrect?'🎉 回答正确！':'💡 再想想，参考例句已展示';
  savePracticeScore(n,s.score,s.total);
}

function setupSyncActiveLine(n){
  var times=LESSON_TIMES[n];
  if(!times)return;
  var content=document.getElementById('content'+n);
  if(!content)return;
  var lines=content.querySelectorAll('.line');
  if(lines.length===0)return;
  var pg=document.getElementById('pageLesson'+n);
  var video=pg?pg.querySelector('video'):null;
  if(!video)return;
  if(video._syncHandler){video.removeEventListener('timeupdate',video._syncHandler)}
  video._syncHandler=function(){
    var ct=video.currentTime,activeIdx=-1;
    for(var i=0;i<times.length;i++){
      if(ct>=times[i].start&&ct<times[i].end){activeIdx=i;break}
    }
    if(activeIdx===lines._activeIdx)return;
    if(typeof lines._activeIdx==='number'&&lines._activeIdx>=0&&lines._activeIdx<lines.length){
      lines[lines._activeIdx].classList.remove('active');
    }
    lines._activeIdx=activeIdx;
    if(activeIdx>=0){
      lines[activeIdx].classList.add('active');
      lines[activeIdx].scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  };
  video.addEventListener('timeupdate',video._syncHandler);
  for(var i=0;i<lines.length;i++){
    (function(idx){
      lines[idx].onclick=function(e){
        if(e.target.closest&&e.target.closest('.line-hd,.speak'))return;
        var t=times[idx];
        if(t){video.currentTime=t.start;video.play()}
      }
    })(i)
  }
}
