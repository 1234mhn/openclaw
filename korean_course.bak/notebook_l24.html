var DATA = [{"kr": "그쪽이 내 약점을 알고 있다고 생각하니까", "cn": "一想到你知道我的弱点", "en": "Because I know you know my weakness", "exp": "<div class=\"e-item\"><b>📍单词</b> <span class=\"g\">약점 — 弱点(weakness) ｜ 알다 — 知道(know) ｜ 생각하다 — 想/认为(think)</span></div>\n<div class=\"e-item\"><b>💬 短语</b> <span class=\"g\">① 약점을 알다 — 知道弱点<br>② ~라고 생각하다 — 认为…</span></div>\n<div class=\"e-item\"><b>💬 造句</b> <span class=\"g\">① 내 약점을 알면서도 모르는 척해요<br>② 그걸 알고 있다고 생각해요</span></div>\n<div class=\"e-item\"><b>📌语法</b> <span class=\"g\">-(ㄴ/은)다고 생각하다 — 以为/认为…。动词→(-ㄴ/은)다고 ｜ 形容词→(-다고) ｜ 名词→(-(이)라고)</span></div>\n<div class=\"e-item\"><b>💬 语法例句</b> <span class=\"g\">① 그 사람이 오고 있다고 생각했어요<br>② 이게 맞는 거라고 생각합니다</span></div>\n<div class=\"e-item\"><b>🎵 音变</b> <span class=\"g\">알고 있다고 → [알곤 읻따고] 连音+紧音 ｜ 생각하니까 → [생가카니까] ㅎ送气化</span></div>", "prac": "<div class=\"e-item\"><span class=\"q\">Q: 누가 내 약점을 알고 있다고 생각하니까?</span> <span class=\"a\">A: 그쪽이</span></div>\n<div class=\"e-item\"><span class=\"q\">Q: 그쪽이 뭘 알고 있다고 생각하니까?</span> <span class=\"a\">A: 내 약점을</span></div>\n<div class=\"e-item\"><span class=\"q\">Q: 왜 당신 약점을 들쑤시고 싶었어요?</span> <span class=\"a\">A: 그쪽이 내 약점을 알고 있다고 생각하니까</span></div>\n<div class=\"e-item\"><span class=\"l\">✎ 改编：약점 → 강점（优点）</span><br><span class=\"t\">그쪽이 내 강점을 알고 있다고 생각하니까</span></div>\n<div class=\"e-item\"><span class=\"l\">✎ 改编：그쪽 → 나</span><br><span class=\"t\">내가 네 약점을 알고 있다고 생각하니까</span></div>\n<div class=\"e-item\"><span class=\"l\">💬 场景对话</span><br><span class=\"d\">A: 그쪽이 내 약점을 알고 있다고 생각하니까</span><br><span class=\"d\">B: 그래서 어떻게 하려고?</span><br><span class=\"d\">A: 나도 당신 약점을 찾을 거예요</span></div>\n<div class=\"e-item\">📎 약점(弱点) ⇄ 강점(强项) · 알다(知道) ⇄ 모르다(不知道)</div>\n<div class=\"e-item\">🔧 [-(으)니까] 因为/既然：시간이 없으니까 빨리 가자</div>\n<div class=\"e-item\"><span class=\"tq\">🔄 翻译：我以为你不知道这件事</span> <span class=\"a\">→ 이 일을 모르고 있다고 생각했어요</span></div>"}, {"kr": "나도 당신 약점을 들쑤시고 싶었나 봐요", "cn": "我也忍不住想戳戳你的弱点", "en": "I guess I also wanted to poke at your weakness", "exp": "<div class=\"e-item\"><b>📍单词</b> <span class=\"g\">들쑤시다 — 戳/翻(poke/prod) ｜ -나 보다 — 看来是(it seems like)</span></div>\n<div class=\"e-item\"><b>💬 短语</b> <span class=\"g\">① 약점을 들쑤시다 — 戳弱点<br>② -고 싶다 — 想做…</span></div>\n<div class=\"e-item\"><b>💬 造句</b> <span class=\"g\">① 왜 내 약점만 들쑤시는 거예요?<br>② 너도 그걸 듣고 싶었나 봐요</span></div>\n<div class=\"e-item\"><b>📌语法</b> <span class=\"g\">-나 보다 — 推测语尾，表示\"看来是/可能是\"。用于动词词干后。形容词用-ㄴ가 보다。<br>例：비가 오나 봐요 (看来下雨了) ／ 그 사람이 바쁜가 봐요 (看来他很忙)</span></div>\n<div class=\"e-item\"><b>💬 语法例句</b> <span class=\"g\">① 길이 막히나 봐요 — 看来堵车了<br>② 그 음식이 맛있나 봐요 — 看来那个东西好吃</span></div>\n<div class=\"e-item\"><b>🎵 音变</b> <span class=\"g\">들쑤시고 → [들쑤시고] 紧音 ｜ 싶었나 → [시펀나] ㅂ+ㄴ → ㅁ变</span></div>", "prac": "<div class=\"e-item\"><span class=\"q\">Q: 누가 당신 약점을 들쑤시고 싶었어요?</span> <span class=\"a\">A: 나</span></div>\n<div class=\"e-item\"><span class=\"q\">Q: 뭘 들쑤시고 싶었어요?</span> <span class=\"a\">A: 당신 약점을</span></div>\n<div class=\"e-item\"><span class=\"q\">Q: 왜 그렇게 했어요?</span> <span class=\"a\">A: 그쪽이 내 약점을 알고 있다고 생각하니까</span></div>\n<div class=\"e-item\"><span class=\"l\">✎ 改编：들쑤시다 → 찌르다（戳）</span><br><span class=\"t\">나도 당신 약점을 찌르고 싶었나 봐요</span></div>\n<div class=\"e-item\"><span class=\"l\">✎ 改编：약점 → 단점（缺点）</span><br><span class=\"t\">나도 당신 단점을 들쑤시고 싶었나 봐요</span></div>\n<div class=\"e-item\"><span class=\"l\">💬 场景对话</span><br><span class=\"d\">A: 나도 당신 약점을 들쑤시고 싶었나 봐요</span><br><span class=\"d\">B: 그래도 그건 하면 안 되는 거였어요</span></div>\n<div class=\"e-item\">📎 들쑤시다(戳/翻) ⇄ 찌르다(刺) · 싶다(想)</div>\n<div class=\"e-item\">🔧 [-나 보다] 看来是：비가 오나 봐요 (看来要下雨了)</div>\n<div class=\"e-item\"><span class=\"tq\">🔄 翻译：看来你也想戳我的弱点</span> <span class=\"a\">→ 당신도 내 약점을 들쑤시고 싶었나 봐요</span></div>"}, {"kr": "그래서 지금은 좀 어때요? 당신 약점", "cn": "那你现在呢？你的弱点", "en": "So how is it now? Your weakness", "exp": "<div class=\"e-item\"><b>📍单词</b> <span class=\"g\">待补充完整讲解</span></div><div class=\"e-item\"><b>💬 短语</b> <span class=\"g\">待补充</span></div><div class=\"e-item\"><b>📌语法</b> <span class=\"g\">待补充</span></div>", "prac": "<div class=\"e-item\" var curIdx = 0;
var curSide = 0;  // 0=精讲, 1=运用

function renderList(){
  var h = "";
  for(var i=0;i<DATA.length;i++){
    h += '<div class="it" data-idx="'+i+'">'
       + '<span class="n">'+(i+1)+'</span>'
       + '<span class="k">'+DATA[i].kr+'</span>'
       + '<span class="p">双页</span></div>';
  }
  document.getElementById("listView").innerHTML = h;
  document.querySelectorAll(".li .it").forEach(function(el){
    el.addEventListener("click",function(){openPage(parseInt(this.dataset.idx))});
  });
}

function openPage(idx){
  curIdx = idx;
  curSide = 0;
  document.querySelector(".li").style.display="none";
  document.querySelector(".v").classList.add("s");
  document.getElementById("listHeader").style.display="none";
  renderPage();
}
function showList(){
  document.querySelector(".li").style.display="block";
  document.querySelector(".v").classList.remove("s");
  document.getElementById("listHeader").style.display="block";

  document.getElementById("listHeader").style.display="block";
}

function renderPage(){
  var d = DATA[curIdx];
  var total = DATA.length;
  document.getElementById("pageInfo").textContent = "第"+(curIdx+1)+"句 / 共"+total+"句 · "+(curSide==0?"📖精讲":"✏️运用");
  document.getElementById("pageTitle").textContent = curSide==0 ? "📖 第1页 · 台词精讲" : "✏️ 第2页 · 台词运用";
  document.getElementById("pageKr").textContent = d.kr;
  document.getElementById("pageCn").textContent = "→ "+d.cn;
  document.getElementById("pageEn").textContent = "→ "+d.en;
  document.getElementById("pageBody").innerHTML = curSide==0 ? d.exp : d.prac;
  document.getElementById("pageNum").textContent = "第"+ (curIdx+1) + "句 · 第"+(curSide+1)+"页";
  document.getElementById("prevBtn").disabled = curIdx==0 && curSide==0;
  document.getElementById("nextBtn").disabled = curIdx==total-1 && curSide==1;
}

function prev(){
  if(curSide==1){curSide=0;renderPage();return}
  if(curIdx>0){curIdx--;curSide=1;renderPage()}
}
function next(){
  if(curSide==0){curSide=1;renderPage();return}
  if(curIdx<DATA.length-1){curIdx++;curSide=0;renderPage()}
}
function flip(){
  curSide = curSide==0 ? 1 : 0;
  renderPage();
}

document.getElementById("prevBtn").onclick=prev;
document.getElementById("nextBtn").onclick=next;
document.getElementById("flipBtn").onclick=flip;

renderList();
</script>
